body:
  text: 浮沚集巻八宋周行巳撰五言古詩憶歐段歳暮何所思道南咸與籍出門泥漫漫跬步成乖隔人情未免俗節物復感廹念我江海人紓節慕古昔少年弄柔翰頗謂得所適豈有軒冕心况自便菽麥人生不可意變態忽如弈狼藉太學生俯就科舉責居然五六載頗不料損益貧賤思富貴富貴悲廹阨所得九牛毛置身豈良䇿何如謝客兒㑹稽卜佳宅文章富貴心山水樂幽僻長安不可居季冬猶絺綌緬望悲故鄉恨無晨風翮寒牕九轉腸紛亂不可繹此意竟誰語坐覺鄙吝積不見二三子詎可論肝膈悠悠百世名浩浩此生跡離婁燭千里盲不見咫尺營居有感有鵲銜枯枝往往營其巢巢成雌卵雛雛出聲嗷嗷雌飛雄啄食絡繹日百遭咄哉誰使汝理也不可逃曠曠宇宙内顧奚獨汝曹人生結棟宇斬木與誅茅經營壯有室耆艾尚勤勞待李純如鄧子同誰云相知好相知亦吾累一夕不在眼青燈已無寐晚定李鄧交付託足心地嶷然諸儒中百馬逄一驥對我懷抱豁軒眉得深意昨朝分手出冠帶修人事淹留乆未返終夕念乖異搖落庭樹秋虚牕發清吹坐起無一歡出門屢瞻跂歸鼔朱絲絃復理黄巻字絃誦雖曰樂其如心不遂歘欲往從君念無晨風翅掃地焚香坐聊以待君至題樂文仲憊軒古有大隠人不必在林藪屠釣得賢傑能出漢庭右用之即為虎信是經濟手樂生淮海來貧窶常露肘迺翁病風痺粥食不到口下簾長安市授經供卯酉生涯一憊軒貎作槁木朽膽實大于身豪氣貫牛斗往往或下人恐是黄石叟屈身以伸道此事古來有貧賤交分薄益見俗態醜丈夫豈得知事定盖棺後與爾同一笑聊進杯中酒寄題鳯翔長孫家集芳亭種木須種松松有四時芳種草須種蘭蘭有十里香衆木豈不大秋至即凋傷百草豈不好露下紛萎黄人生事園圃用意各有方不貴草木多只貴草木良但種松與蘭主人家道昌玩師求詩歸台州越鳥棲南枝胡馬依北風人生亦懷土安能長西東玩公白雲老方丈慿髙峯忽為萬里逰應緣來晨鐘君看伊與洛二川日溶溶逝者亦如此流轉何時窮我居謝公山天台一水通莽莽宇宙内那知忽相逄塵埃識眉宇覺我耳目聰暫來還復去有如無根蓬令我長歎息不得乆相從側身雞鶩羣仰羡髙飛鴻奉和佛月大師朝出太學門廣路長飇飛如何緇塵微汚我如雪衣擬足投清淨入寺扣禪扉遇彼賞心人發言破夕霏既見彌明句乃知侯喜微琅琅發妙語慰此渴與飢小巻大字書一一各有歸更以金玉贈萬丈生光輝日落微雲收明月滿書幃贈沈彬老永嘉人物衰斯文乆零替學徒寡道心日與風俗敝我生衰敝後上思千載事實欲閭里間一一蹈仁義敬重鄉人情翻遭俗眼忌晚得沈夫子學問有根柢矯矯流輩中頗識作者意歡然慰吾心歸此同好嗜吾子更我聽士也貴尚志古道自足師不必今人貴荼苦不異畝薰蕕不同器所憂義理愆何恤流俗議進道要勇決取與慎為計去惡如去沙沙盡自見底積善如積土土多迺成巋讀書要知道文章實小技子試反覆思鄙言有深味自非心愛合安能吐肝肺行行慎取之紓節思逺大豈但勸鄉閭永為斯民賴敬贈李方叔廌蛟龍吐雲氣霧豹出文采許潁有佳士翰林風流在吾道固多艱明時屢危殆嘉榖生螟蝗稊稗勞取采平生數萬言未料寒與餒天生濟世才發揮必有待伯樂一顧重豈不價百倍展足造青雲㑹見絶四海顧我茅葦姿謬欲漸蘭茝達人固多可借譽飾駑猥丈夫一相知胸中何磊磊願作南山松青青期不改此事雖一時風流激千載肺病吾生與静侔早無適俗器失身掛塵網道心日已替今茲得肺病自可絶人事黙觀悟生理是身同一蜕代馬無南蹄越鳥無北翅物各歸其本我何有于世冠冕且罷休養痾山水際藉石看白雲臨流鼔蘭枻百種絶念慮優游聊卒歳誰云病疾苦邂逅即良計次韻李十七僧宜見過兼簡杜思誠坎壈客逰子歳莫懷百憂困若伏轅駒未遇甘垂頭志度藴剛潔勁氣横清秋豈事稻粱唼比翼黄鶴逰人情憎遠客言笑懷戈矛有道死不冺能昜匈匈不窮當志益堅詎逐波上鷗有杜莫逆交有李山陽儔日想文義㑹夫我心則休心休日月閒忽忽時歳遒俗子浪嗤詬日夕競咆烋圓鑿事方枘固知不相謀我徒方外士汎若不繫舟東西與南北無入不優游至此願隨俗俛眉愧前修駕言歸去來山寒不可留薄俗利口實斬斬非我侔太息仰明月忍作尋常流蚊天地不愛人生此人之苦吁嗟實微物身不及毛羽利嘴善噆膚令人失眠睡長夏五六月執熱不通噫此物于是時翾翾夸得勢一聚動億萬翳空如坌壒當晝即散伏得夜乃紛㑹毎見燈火集不容設幬盖初若蝟毛戢次第緣罅隘稍稍傍耳飛嚶鳴欲相賣揮拂不敢停得便時一嘬所欲未涓滴已見盈腹背捨命不畏死忽遭一拍碎顧我七尺軀豈不容爾細蜂有毒在尾爾有毒在喙畏爾衆口多不比蜂一蠆安得厲金商掃蕩聊一快寄題江陵李潛道釣磯嚴陵避世士四海一釣磯三聘非其心獨采富春薇蒙城有静者白首卧荆扉築臺俯溪鳥黙翫道心微箕踞謝官長把竿忘是非少年詞賦場秉筆落珠璣投老漫假板長嘯却南歸緬懷直鉤理濯髪待日晞貧賤得肆志富貴多危機觀傅公濟胡志衡楚越唱和集因成短句奉贈清露凝百草四海黄葉秋逰子思故鄉中夜攬衣裘起坐不成寐歎息銜百憂乆客豈其願亦為甘旨謀平生少年日睥睨氣食牛秉志三皇前展步狹九州乃今已半百尚有餓凍愁生逄聖明代不忍棄田疇折節衆士底足為妻嫂羞伯樂尚未遇焉知非驊騮觀其楚越集迥覺出輩流有如閲武庫森然見戈矛近者咸興作無乃或暗投五車空拄腹一飽豈易求不如臨洮子匹馬萬户侯遇合各有時莫笑東家丘復用前韻奉酬夢符學錄子卿五言法氣格厲勁秋綿綿武功裔尚不廢箕裘洒然落妙語一破萬古憂文章本道徳作者通神謀惜其命不達白首猶飯牛學者願識靣或比韓荆州儒冠真誤身未免妻子愁長安游俠兒生不辨田疇儒有不黔突此輩飫珍羞左右夾燕趙出入跨騏騮富貴即稱賢寧辨清濁流乃知讀萬巻不如持尺矛斯言雖有激亦為智者投古人願執鞭如或不可求君看授業生已為公與侯颯然灌園翁零落守舊丘古意贈答段公度野人比芹子昔獻已負慙安得長者語借譽苦為甘自愧敝帚姿欲駕騧驪驂寸進復尺退虎穴詎得探寄題方氏賞心亭日月歘不淹萬物紛迥薄冬索復春敷夏茂以秋落彼來無窮期詎可盡酬酢人生聊爾耳政應如解籜可料百年身胡為自束縛達人暢髙情物物各有樂濁醪隨身置心賞悟逺託陶阮寓酒意斯亭豈虚作送别人生如斷蓬萬里忽相值㑹日常苦難别日常苦易十年聞子名未識已心醉我友豈不多愛子好心地身小胸膽大靣目無邪氣磊磊棟梁姿温温瑚璉器人物衰落盡百馬逄一驥我懷未傾倒離别已復至天寒霜正繁山險道不利君行獨何為百里求自試願持孝友資發為惻隠治上馬且勿難吾民竚嘉惠他年廟堂上舉此亦不異强飯數寄書待爾慰窮悴同舍劉子美將歸唐作詩見貽次韻以送其行我學比棘猴漫費三年刻技成無所用奔走虚南北儒生紛逐利雅道日衰息乃獨資章甫取售祼人國雖知自守重豈若趨時得念欲障狂瀾亮非一簣力吁嗟且置此徒使氣填臆與子共師友焉得乆黙黙行行慎兹道慰我日惻惻送友人東歸是身如聚沫如燭亦如風奔走天地内苦為萬慮攻陳子得先覺水鏡當胸中異鄉各為客相看如秋鴻扁舟忽歸去宛然此道東我亦議逺適西入華與嵩飲水有餘樂避煩甘百窮相逢不可欺偶然如飄蓬于道各努力千里自同風和郭守叔光絶境亭雲横絶塵境峻堞若繩削羣山列培塿衆水分脈絡下瞰萬瓦居縹緲見樓閣松風發天籟泠然衆音作皛皛天宇清塵襟一澄廓少年子臨洮少年子白馬黄金羈醉向壚邊宿小女倩縫衣不惜千金贈只惜少年時當時不行樂過時空自悲北山閣北山有髙閣暇日聊登逰臨眺益慘愴焉能寫我憂軒軒皆嶄石激激瞰溪流野鳥時上下白雲自沈浮徙倚事窮覽良時忽我遒日匿西岡下月出東嶺頭寒烟没樹杪勁風夾山陬十月客衣單不可重遲留緬望涇水濵使我心悠悠九日登髙有感置酒臨重陽舉觴忽不樂憶昔登髙日親朋盛杯酌人事經年異物景但如昨生别未㑹遇死别已冥漠吾生更飄蕩四海無所著黄花眼中見翻令懷抱惡莫覓四坐歡節序正寥落征婦怨嫁君苦太遲别君苦太早官行有程期不得暫相保妾有嫁時衣金縷光葳蕤送君即逺道數日望君歸君去竟何許君歸竟何長昔為膠與漆今為參與商朝看雲間鴈暮看水底魚鴈魚過幾許何處寄君書有食不下咽有衣不被體夜囘九轉腸日下千行淚階前萱草長奩内粉黛空萱草不解憂粉黛為誰容人生若朝露顔色豈長好况乃懷憂愁憂愁復易老及春不開花結子待何時君在須早歸妾在長相思妾不願君富貴妾只願君賤貧賤貧足相保富貴多棄舊妾不願君成功妾只願君早歸早歸及年少功成妾已老君去妾二八容顔花莫如肌白不著粉色紅不施朱即今君尚未酬勲妾年二十已有餘楊花楊花初生時出在楊樹枝春風一飄蕩忽與枝柯離去去辭本根日月逝無期欲南而反北焉得定東西忽然驚飇起吹我雲間飛春風無定度卻送下汚泥寄謝枝與葉邂逅復何時我願為樹葉復恐秋風吹我令黄萎我願為樹枝復恐斧斤斫我為椽榱只願為樹根生死長相依和子同觀音寺新居太學士千數濟濟多白袍其中靡不有令人愧遁逃風俗且如此焉能獨守髙詳擇乃其道或得賢與豪近復失段子嗚呼命不遭吾生得覬豁誰能置圈牢武或萬人敵何用學六韜文士亦齷齪勞心徒忉忉利害竟何許相去九牛毛脱略或吾事青松隠藜蒿麟鳯豈仰見狐狸多呌號如不卜清曠樂此阮與陶文思韓吏部詩見杜工曹揮麈談風月中夜聲颾颾往往移北山不必反楚騷吾道用無窮所志各有操或隠身幽討或放迹逰遨平生事已定用心奚獨勞送畢之進狀元二首春風不開花吹雲翳白日天寒食不足江頭拾芋栗我馬不敢驅畏此霜霰密君行當奈何開㠶轉飄忽挽舟君且住為君一洗拂今日此良㑹他時未可必我生鋤犁手一飯願已畢官曹雖强汝今汝心若失扁舟行亦歸還我性曠逸騎牛不騎馬鼓腹吞溟渤他年作霖雨勿汙我蓬蓽畢髯竒男子未識已心與獻䇿進英殿脱畧獨豪舉二年襄陽幕歸舟峴山渚同事三日留時時作險語隆準帝王孫蕭然好風度詩書百萬巻胸中莽迴互平生蘇惠州氣槩頗自許人生艱難際政可觀去處二子經濟才用之則為虎髯公且為客王孫且為主明朝各天涯歌眉為誰嫵柂師挽舟去回首空南浦莫笑參軍强參軍定强否雨中有懷世態紛戢戢客愁亦不盡坐牕木榻穿百慨逢一哂觸眼敗人意喜事日益泯小暑三日熱重我憂躁疢崇朝一雨洗意氣覺清𦂳焚香彊起坐曲肱聽鳴蚓出門復有觀物色相蠢蝡危芳墮簷牙水螾上堦楯失勢蛛墜網得時朽蒸菌矜飛啄泥燕戢翼翔雲隼此理復誰論中膓紛結縝懷我平生好意得如合脗款段屈薄宦有如驥服靷兖李困諸生豪氣浮海蜃華李本達識磊落忘畦畛忼慨任闗西開口見肝腎髙蹈潘逸士未能趨縣尹小王頗清修對策如射埻復有孫夫子未許連車軫聚散各異處單車謝推引言笑誰與歡思逝如抽筍作詩當晤言為我發大辴奉酬天復古風我生不愛言欲言令人惡總總乾坤内抱此誰與託昔者所親人今或苦荼若生交各分離死交已冥漠事非固必存千載一轉腳要知達士心閲世等糟粕不求萬法脱不與萬法縛索然天地中去留如解籜萬事豈足為而苦自結約吾以此應世方枘入圓鑿何當得蔡侯飄若雲中鶴新詩近道要如病飲良藥上言古心人次言時道薄落落濟世志拙者但駭愕功名付吾子我獨甘藜藿誰知陋巷中簞瓢有餘樂五月二十五日晚自天夀還呈秦少章客思日百種無一適所願入夏對燈火坐牕如坐圈開口畏禍機俛首學癡鈍嘉友不在眼相思劇方寸晚凉䇿馬出豁然對清論盈月阻良覿歡喜論繾綣上言得三益次言科舉囷新詩破煩想覺人體中健重我特特來殷勤留一飯促膝對夜樹蕭爽無俗坌歸來勞夢侵令人欲髙遯政和丁酉罷攝樂清寓柳市莊居和林惠叔見寄懷祿非其心事君要以道古來際遇間毎恨見不早觀其風雲㑹事業何草草卓哉張子房器博用殊少恐量世主心用此恰恰好所以收其才逺從赤松老富貴非利達貧賤非枯槁超超聖賢心吾欣願執掃遷居有感示二三子四時忽代序靡靡無停息白露應節降凉颸變晨夕閒居二十載遷徙靡寧日鳥鼠有巢穴我居無定室田園固所乏婚嫁何當畢貧賤難為好仁義寡所匹總總百年内萬事安可必人生七十稀我今五十一齒髪已彫喪肌肉乏腴實固窮吾素分茍得鮮終吉餘年當幾何任運非得失發東陽客行無緩程悲吟無緩聲促促復促促居家食不足徘徊重徘徊欲行還欲歸近懷逺弗顧强復驅車去七言古詩寄魯直學士當今文伯眉陽蘇新詞的皪垂明珠我公江南獨繼步名譽籍甚傳清都達人嗜好與俗異誰欲海邊逐臭夫小生結髪讀書史隠憫毎願脱世儒幾載俛首黌堂趨爭唼梁藻從羣鳧野人鼓瑟不解竽悠悠舉目誰與娛幸有達者黄與蘇誰復跼蹐如轅駒古來志士恥沈没參軍慷慨曵長裾相知寧論貴賤敵詩奏終使蘭艾殊當時仲宣亦小弱蔡公歎其才不如迺知士子名未立須藉顯逹齒論餘嬰兒失乳投母哺當亦飲食瓊漿壺次天峯居士韻奉寄天峯靜者巢箕叟著書不為牛馬走夜雨題詩寄日邊觀者辟昜皆縮手嗚呼大雅乆不聞吾道悠悠付林藪伏龍鳯雛人未知腴田猥大皆稂莠將軍為志窮益堅魯儒雖死不更守鷦鵬有翅須摶風苦李當道誰開口京師車馬十二門一日萬億無不有吞腥啄腐何卒卒正坐誚言芷漸滫可憐惠施多才卿不悟據梧瞑低首功名浩蕩悵何許置身謀慮苦不乆盍似淵明歸去來不作折腰求五斗飽食大人如肉山衮衮奔馳氣如吼東山野人氣亦芒郎將自昔今獨否誰能脂韋化百鍊世態欻如屈伸肘何時尊酒話疇昔擊節新詩意非茍泥雪憶志康公度元老正月二日多雪寒京師道路無日乾巷南巷北一望隔出門但見泥漫漫歸來危坐官屋底日飽太倉半升米相思更覺行路難蒙垢何當為一洗和任昌叔寄終南之什少陵作者今卓爾彭澤一觴意何已詩工酒逸覺有神此理浪傳嗤俗子卻求舉選科目間仰看有道當汗顔聞君欲往更愁絶歸心日夜急飛湍送歐陽司理歸荆南荆南秀氣有異才我今見之歐陽子長年讀書五車過下筆神㨗風雲起一昨新書警末俗儒衣喜好入骨髓此君矯矯出輩流一心本學妙達理斯之自信謝黨與萬口一律誰信爾眼明卻見法令新四海文章盡蘓氏馬羣一遇伯樂空近拔其尤自君始可憐平生萬艱苦及壯一官歸故里丈夫行道㑹有時用心深處良獨知眼中人才不昜得鳯翥龍驤非爾誰野人一身日百謗人笑阮癡端不癡憶昔定交論心腹示我青青千載期茲事風流定不朽謝爾紛紛輕薄兒如此嘉㑹豈易得端知聚散非人力相期逺大莫相憶要須身健且强食次君陟見志韻秋風颯颯吹寒雨寒士畏寒不畏暑杜陵四海無尺椽頗思大屋連千礎大庇天下寒士寒小利猶能及雀鼠平生志大不小用未解從人問科舉可憐時俗喜儇媚此道悠悠付何所不如歸來負寒日食芹得味絶不去人生何處無一飯飽卧便便腹如鼓竹枝歌上姚毅夫元祐辛未閏月既望隴西太守燕客于郡之雅歌堂客有某好余詩歌因作竹枝詞五章章五句以紀其事而一章言其行樂之欲及時二章言其及時而樂三章言其樂極而悲四章言其悲而自反五章言其反正也秋月亭亭揚明輝浮雲一㸃天上飛歘忽囘隂雨四垂人生萬事亦爾為今不行樂待何時翠幕留夜燈燭光主人歡娛客滿堂龍船盛酒蠡作觴秦吹齊歌舞燕倡夜如何其夜未央佳人玉顔冰雪肌寶髻繡裳光葳蕤齊聲緩歌楊柳枝歌罷障靣私自悲坐客滿堂淚霑衣酒當毒藥色當斤人生行樂如浮雲一杯更盡客已醺美人不用歌文君客有相如心不春壺傾燭燼樂事衰堂上歌聲有餘哀主人謝客客已歸風蕩重隂月還輝皎皎千里光無虧浮沚集巻八
