body:
  text: 浮沚集别集類二宋提要臣等謹案浮沚集八巻宋周行巳撰行巳字恭叔永嘉人元祐六年進士官至秘書省正字出知樂清縣陳振孫書録觧題稱其為太學愽士以親老歸教授其鄉再入為館職復出作縣鄉人至今稱周博士盖相沿稱其初授之官也振孫載浮沚先生集十六巻後集三巻宋史藝文志載周行已集十九巻正合前後兩集之數而又别出周博士集十巻已相牴牾萬厯温州府志又稱行已集凡三十巻更參錯不符考振孫之祖母即行已之第三女振孫所記當必不誤宋史及温州志均傳訛也行已早從伊川程子游傳其緒論實開永嘉學浮之先集中有上宰相書云少慕存心養性之説于周孔佛老無所不求而未嘗有意于進取又有上祭酒書云十五學屬文十七補太學諸生學科舉又二年讀書益見道理于是學古人之修徳立行云云觀所自叙其生平學問梗概可以畧見則發為文章明白淳實粹然為儒者之言固有由也且行已之學雖出程氏而與曾鞏黄庭堅晁説之秦覯李之儀左譽諸人皆相倡和集中寄魯直學士一詩稱當今文伯眉陽蘇新詞的爍垂明珠于蘇軾亦極傾倒絶不立洛蜀門户之見故耳濡目染詩文亦皆嫻雅有法尤􅊰學家所難能矣集乆失傳今從永樂大典所載蒐羅排比共得八巻較之原編十㡬得五尚足見其大凡也乾隆四十七年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部三浮沚集目錄别集類二宋巻一奏議二首表二首巻二經解十二首巻三䇿三首䇿問十二首巻四序十二首記二首巻五書五首啓九首巻六雜著三十二首巻七祭文九首誌銘十三首巻八五言古詩三十五首七言古詩十一首卷九五言律詩三十五首五言排律二首七言律詩二十一首五言絶句五首七言絶句三十五首
