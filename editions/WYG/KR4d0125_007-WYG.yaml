body:
  text: 浮沚集巻七宋周行巳撰祭文代朝請祭金華縣君文悲夫人世生死相續百歳幾何草露風燭昔我季父起家白屋弱冠甲科四十州牧謂富與貴不求從欲職始校理官纔郎屬奄至大故徳卒不祿嗚呼金華實配我叔安樂生同艱難死獨嗷嗷諸孤孰為饘粥以卒婚嫁以資飽燠它時有餘今日不足人生如此曷其反覆惟某不孝或謂可錄叔父父我是教是告叔母母我是拊是鞠覬其有成以嗣吾族得官歸覲喜溢靣目送我于行涕泣以囑平生善言終身三復微叔我告我于何榖微母我鞠我于何餗恩徳隆厚日月遄速自叔之亡如傷屠戮往來見母尚盡欵曲毎及平生相顧頗蹙孰謂一别罹此荼毒彼蒼奈何斯人不淑聲容揚揚杳不可矚生死茫茫昧不可贖尊設酒醴殽具水陸銜哀陳辭永訣此哭祭馮當世文嗚呼知生者弔知死者傷今或不知其死而傷之者吾亦勝其所當抑人情之必稱何禮文之固常惟公既名重乎朝廷于下走而奚取曾聲氣之未接洞心情而相許或者誚公公寧弗疑欲妻以女嘗不鄙夷不合而止人亦斯已還登于朝終以薦禰噫士之相知蓋百世而一遇曾毫釐之未報忽厭世而我去謂大徳之宜夀曷中道而遽亡天乎難堪人也弗康伊昔脱驂惡涕無從今此薄奠以薦其衷祭親友文生不可有附贅懸疣死曷能逃泣露浮漚金烏西墜其誰與留長川東逝其誰與救去歳今時霜月如晝公于是時天命不祐氣兮觱發風兮栗烈公于是時歸宅荒丘念我昔日與公相友嗟我未來匪友匪媾我有季友則謂公舅公有令子將慶公後捨我長往不遂一覯具此薄奠作歌以侑公兮有靈宜鑒于柩祭劉絜矩文惟子之愷悌明敏鄉人待以有成孰知其忽然至此耶嗚呼哀哉子之始來京師與其兄同補太學生便有聲兄歸子留以期于成曰親之志也雖去親之側而予不憂居太學一年太學以其行成使試藝于秋官果以得名當此之時鄉人咸慶子而子之親亦望子以為榮也明年既不利于春官將歸省其親鄉人既送子行翌日輙以疾告急出視子疾非尋常子曰此疾其將殆耶鄉人皆曰子也何至于此乃與子卜醫得吳謀于鄉人謀于朋友咸曰是良治子之疾日見厥效子亦自云我之疾其有瘳乎子既起床坐且行矣語如無事時鄉人皆喜且為子合謀曰子當亟歸以釋親憂子曰方夏之熱我倦不可以行李且遣奴歸以報我親俟秋而歸及秋子家使人來迓子于京師而子之疾果殆于初矣鄉人蹙然私謀曰是將必不可以復起也且奈之何易醫凡三藥物亦良而不與病當而已在膏肓綿綿延延竟殞厥身嗚呼孰謂子之愷悌明敏而至于此耶人皆有死而子獨不夀而夭耶昔者來自逺鄉以待子成且榮雖去親之逺離親之乆而不以為憂今乃客死于京師殁不得臨其屍殮不得視其棺為父母兄弟者奈何其悲昔之所以不為憂者今則甚憂也嗚呼哀哉其奈之何鄉人與子家門客張秀才共殯子之柩于國東門外非葬也以待子之家來取也今月十六日子家遣外甥僧修與子之故奴王新以書來報某等曰子之柩以地逺隔江海不可以負歸無可奈何願為火化獨得其骨以還葬于鄉與其在京師亦可以不為異域鬼也嗚呼哀哉子之親至于此心如何其悲也鄉人敢以是命卜今月壬戌之良日發子之殯舉子之柩將衣之以薪而使子之形骸與火俱化嗚呼哀哉是亦子之命夫病不得在親之側殁不得終于寢之堂葬又不得從先王之禮教其可奈何嗚呼哀哉事固有不可奈何禮固有反經合道子其有知斯達矣生為今之人而死同太古之道亦自有可樂者如死者無知矣則此又安足較耶嗚呼哀哉生死之道不可知存亡之理不可推其然耶其不然耶姑陳詞以薦誠魂有知其鑒此祭張子充文元豐太學莫如子舊學醇行懿惟才之茂徘徊塲屋數上數否八行設科遂為舉首天子嘉之可為師表一命南昌州學教授再命辟雍小學司紏方將進用疾遽不救人胡為善天胡弗夀昔送子舟今拊子柩澘焉出涕念子游乆仲氏懿親同學良友今子既亡吾故亦朽人生萬事何所不有從事難任卜居未就男長女大髪白面皺視子之年吾亦豈乆分既有定事非必偶悠然任運泊然自守死生一門聊飲吾酒祭劉取新文緬歳月之逾邁謇吾生之多忤慨百年之共盡忽四時之代序紛羣感之増懷鮮一歡之獲遇何懿親與暱友倐朝亡而夕故若夫子之堂堂矧年齡之未暮惟生稟之正直宜神聽之祐助曾有政之弗施而天喪之奚遽匪溺親私實懷友輔我善曷告我過曷補悵艱途之念深弭情話而誰晤悲一飯而三輟痛達旦而九寤尋髣髴于平生惝彷徨而靡據唁嫠老以彌哀撫孤遺而逾慕疇先進于已往閲逝川而競注託末契于後來與今吾而異趣已矣乎惟達人之大觀通死生于一度洎暫聚之隨化炯真常而永固吾知子之未嘗亡子亦與吾而未嘗去杳無臭以無聲泊何思而何慮祭王司理文生死之分達士之常曰仁者夀夀胡弗長典獄再期孰匪孰良凡我邦人罔不曰臧官斯事斯吾亦其康今其亡矣曷不䀌傷躬致薄奠示哀不忘祭女弟悦師文西方聖人明世之説以親戚為緣累以死生為幻妄汝願學焉而為之徒捐棄天屬得其適于昨生蜕脱天形復其真于今死汝既無憾吾亦奚悲乃若吾徒學于中國明人倫于一性未嘗不哀也而亦未嘗哀通晝夜乎一貫未嘗不死也而亦未嘗死故吾哀而不傷非累也謂汝死而不忘非幻也汝既學焉知其理矣如或以生為戀以死為憂則何所見焉而為之學何所學焉而為之徒祭劉令人文惟順與正女子之事今人有之克相夫子哀此良人泣繼以死我思古人此誠烈婦身埋九原義重千古我則􅊚婭逮其季母不敢以傷致此觴俎誌銘趙彥昭墓誌銘士患不立不患不聞元豐作新太學四方游士歳常數千百人温海郡去京師阻逺居太學不滿十人然而學行修明頗為學官先生稱道一時士大夫語其子弟以為矜式四方學者皆所服從而師友焉蔣元中沈彬老不幸早死不及祿劉元承今為監察御史元禮為中書舍人許少伊今為敕令刪定官方進未艾戴明仲為臨江軍教授趙彦昭為辟廱正以卒張子充最早有聞毎舉不利今以八行薦于朝凡此吾鄉之士皆能自立于學校見用于當世其間或先或後或貴或賤或夀或夭則有命也然不可謂不聞矣明仲之喪某嘗為誌以哀不幸今彦昭葬又來求銘嗚呼吾于彦昭其可辭乎彦昭為人博學知古今性嫉惡喜論天下事自其少時已不羣方十歳能為猛虎行鄉里大人先生莫不竒之以為必自立少孤季父析其資産與兄異材稍長曰非也悉舉以屬其兄獨逰京師已而有名登崇寧二年進士第主潁昌府長葛簿屬天子益修學法州置學官選為濟州州學教授導學者以篤學力行不専務科舉士有成材攷滿朝廷以為能遷辟廱正兼攝司業浸嚮用矣不幸有疾遂至不起年纔四十八官纔承直郎嗚呼悲夫彦昭諱霄其先蓋㑹稽人五代之亂始徙永嘉曾祖某祖某父某皆隠徳不仕先娶同郡薛氏生男二人寧孫享孫女三人長歸沈琮次歸陳亶次在室再娶括蒼祝氏生男一人桂孫早死寧孫享孫皆才美而善學人以為彦昭有子也僅勝冠相繼以死彦昭之亡幾至絶世家人求得遺子于外曰紹孫今纔十歳嗚呼彦昭才而為善者也其報若此豈天之于人豐其名者嗇其福乎其殁于京師辟廱官舍大觀三年四月六日也其葬也于其鄉李奥之原政和元年十二月八日也銘曰貴賤夀夭屬于天仁義忠信屬于人達非其通窮非屯殁而不朽為有聞旁可萬家李奥原善無不報尚後昆許少明墓誌銘三代而上士之賢者由鄉舉里選度徳而定位量能而授職故朝無濫進下無失實自漢以後始詔䇿士然猶問以當世之務不全以言至唐設為科目文益煩而實益失法益密而氣益衰魁偉卓犖之士俛首章句一不中程蓋有終身湮没而不得進者夫天之降材固將有用于世而士之學道亦欲兼濟于時而後世取士之科毎不足以得之廢天之材乏士之用可勝歎哉吾鄉許少明先生蓋其人已先生身長八尺眉目疎大偉然豪舉真人之傑也自為兒童已氣概落落日誦數千言數歳即能為詩從鄉里長者丈人逰皆竒其才氣必大有成甫冠逰京師補太學生文詞秀出等輩學官先生交口稱道居鄉里教授學徒諸邑交禮迎至學校邑令下車必造其廬請所以為政有疑議多就諮决其為人所禮重如此凡三上禮部而名不登于仕籍顧且老矣無以行其義為治説二十篇奏闕下皆當世之要務乆之不報浩浩然有歸志曰君臣之義不可廢也遇不遇命也遂卜居邑之東山躬耕晦迹不復進取嗚呼若先生者豈其學之不茂才之不足歟惟其科舉較藝之敝不足以得髙世之士而司文者又未必知言之人此所以覬倖十一而失之者常多也崇寧天子繼述先帝嘗患科舉試言一日之選不足以得士之實參稽古今作新一代之文州建學校學置官師罷三歳科舉之試為三舍攷選之法又設八行之舉以察隠徳凡士之占一藝著一行者莫不畢用于時可謂無遺賢矣先生于時老且病勌于世故卒不見用而終此可以語命也夫先生名景亮居温州瑞安縣生五十七年以政和三年十一月甲子卒于家卒之日邑中之人皆涕泣相謂其君子曰吾何逰乎其小人曰吾何依乎相顧涕泣至行道之人弗忍蓋先生平日極輸誠信樂施與援人之急所以得于人者如此娶同邑趙氏女生女子一人歸郡學生薛得輿無男子為後于是其弟景衡為承議郎大名府少尹政和五年十月己酉少尹舉先生之喪葬于郡之西山瑞鹿寺之西原以某與先生逰卜銘銘曰為天下者必用賢而賢不必用者取士之法未至也法既至而不得賢者有司之罪也有司明良而或失之者蓋亦有命焉爾矣士茍知命則其進退豈不綽綽然有餘裕哉嗚呼少明先生之謂歟夀昌縣君胡氏墓誌銘某之從祖叔父名況崇寧元年以奉議郎知信州鉛山縣事十月庚辰喪其夫人夀昌縣君越明年使來告曰吾將以崇寧二年十一月初九日乙酉葬夀昌于常州江陰縣來春鄉道泰之原屬汝銘某謹按夀昌君姓胡氏世為毗陵望族曾祖謀某贈太師開府儀同三司沂國公祖諱某太常寺奉禮郎父諱某早世弗及仕胡氏自文恭公起家嘗以其兄之子歸吾從祖祖父校理既又以其兄子之子歸鉛山于是遂為世􅊚而夀昌與校理之夫人以姑姪為姑婦凡吾周氏之族皆曰鉛山夫人之賢似吾校理夫人之賢蓋其為胡氏也保傅之訓教者相若也為周氏也姑婦之詔聽者相若也故以其所以為女事者為婦事而周氏之為婦道者皆曰是為婦足法以其所以為婦事者為母事而周氏之為母道者皆曰是為母足法也嗚呼女子之行不出于閫擬人之善莫如其親是所以書也所以信也夀昌蓋以夫登朝封為邑君享年五十有七生男子五人某皆舉進士女子三人長適晉陵胡璿次適髙沙李材次許嫁姑蘇徐孝廣孫女一人銘曰生有訓歸有詔婦是則母是傚惟夀祿彼覆燾訂來者視豐報王君夫人毛氏墓誌銘吾友良弼將葬其母以鄉八行朱敏功狀來請銘維母夫人姓毛氏永嘉郡人年甫及嫁歸同里王氏之瑜王氏家方多資屬舅姑相繼喪世口衆費廣家財稍衰夫人才智出諸男子右能不愛其裝具悉貨所有佐其夫以事本業于是閉門處約問遺服用不敢修飾至衣其子雖弊不恥艱躓數歳家乃少贏諸子稍長悉遣逺就師學聞州里之賢者輙語其子曰茍如其為人雖不利進取吾何汝責故其子所與逰多鄉里善人君子而所習問學知本徳性異于科舉茍得之士此其夫人所知過人逺矣良弼夫人長子名清臣最賢方夫人之疾其初甚微雖明醫不能察其所以治良弼以為憂悉攷方書精求藥材得所謂乳核之證與所以治療之方于是夫人疾小間者數年而良弼遂知醫藥他疾有不能知者往往投藥屢中二弟天益天澤皆能遵其訓守循循無大故夫人年五十一卒于政和元年六月十四日四年二月十二日乃始克葬于其里大羅山天柱峯之麓銘曰才而智成人之室維其義子克家法後世夫人之譽永終惠丁世元墓誌銘國朝既包有四海温之為郡粤在海隅而民方幸脱五代之亂其上世未有業儒為官者家或饒資必被役于公凡民一為吏則挾法鉤致人情倚為輕重以邀利入是時惟吾家曾大父贈屯田君與丁君世元顧籍文無害出入公私毫忽不犯故皆號稱長者而二人亦獨相好由是屯田君以其女歸世元之子某生晚不得親見其行事尚聞諸族黨與鄉里長老之所傳咸謂世元為人性寛而色和尤喜施惠樂道人以善無少長戚疎皆得其歡閭里有爭者往往先就決曲直君以為可然後敢聞有司以為不可遂不復訟曰丁君長者必不我欺至其家一切飾以儒者法度常曰男女婚嫁必于儒家庶可訓以善而責以義使子孫學儒猶坐嘉䕃之下自有清風至于他術譬如置之荆棘動輙見傷況足庇身乎故于丁氏之家無他業而君子長者之風子如其父弟如其兄鄉黨莫不推重以取法焉則其為善之效益可見矣君治平四年正月乙亥以疾卒于家享夀六十有九其孫昌期承父後以熙寧二年四月丁酉葬君于郡之西山法濟院之北原已恨弗獲銘其墓于是始遣其曾孫某來求所以表其實于某昌期蓋周出也于其父行不可得辭且謂夫人為吏以厚一可書也以儒施家二可書也為善之效三可書也是可以書也某安得而不銘耶君諱某世元其字也曾祖諱某父諱某皆不仕取葉氏生子男一人某先卒女一人適進士蔣某于是元祐八年七月庚寅叙而系之曰敦彼人斯吾邦是臧封之巍巍實為其藏貽示後人無或吾傷蔡君寶墓誌銘人生百年歘若白駒之過隙其間時命不齊或三四十年或五六十年抑又幾何故未知善必汲汲求知善既知善必汲汲求為善豈惟分陰之可惜盖亦一念之不可怠也吾友平陽蔡君濟嘗為予言其兄君寶頗患俗之不美親在而異財既歿而私居也嘗欲廣其室廬以族處益其田疇以族食于以合宗族于以表鄉閭皇皇汲汲凡經理資財以為是盖十餘年矣年甫强仕志弗克就而不幸以死嗚呼古之為善者夜以繼日坐以待旦盖懼夫時不待人故也君寶父汝平弟元康元嘉皆為儒者而君濟最有知識善學賢士大夫多傾下之其兄君寶之强為善也又如此獨惜其年之不足不能成其所願為以見于世此可為長太息也君寶名元龜娶母之姪女陳氏生女一人男二人皆未名其卒也以政和二年六月丁亥其葬也以卒之明年三月壬申君濟書來請銘銘曰蔡氏之先温陵其邦自唐中和徙温平陽世業儒仁君材幹强力相厥家覬以儒昌合族而居謀之孔臧年期不百志弗克揚垂髫在室戴白在堂人之亡矣曷歸其傷大奥之原邑之西鄉廼銘斯善以慰其藏沈子正墓誌銘永嘉沈躬行之父諱度字子正年六十一紹聖元年三月某甲子卒于京師明年某月某甲子葬于其居邑瑞安縣某鄉某之原先期躬行致林石介夫狀來請銘觀君平生治行盖剛介尚氣節不惑于流俗者也温為郡並海俗信巫祝禁忌至使良民䧟于不義方春病瘟鄰里親戚絶不相問訊死亟置棺他室密封固棄去百日乃啓為喪事謂不爾且相傳以死有司不知禁民習莫敢犯熙寧初永嘉大疫君母病死其女奴又死家人卧疾數輩内外皆恐議如巫説君獨不顧觸禁忌具棺歛為服朝夕哭泣薦奠如禮卒無他居邑火禁其友廬人莫敢嚮君聞譟作疾趨蹈煙熖負其母而出鄉人壯其義是可銘者君曾祖諱某祖諱某父諱某娶某氏生子男三人名志行躬行夷行女子六人嫁張暉陸綱林晞顔葉正已趙霑其一尚㓜君喜儒男必遣就學女必歸進士洛陽程頤正叔京兆呂大臨與叔括蒼龔源深之與吾鄉先生介夫皆傳古道名世宗師學者莫得其門君能資躬行從之遊而鄉黨朋友咸稱之以為君子之子其來請也又可得辭銘曰不惑于俗智也趨人之急義也君則已矣以尚其子戴明仲墓誌銘道學不明世儒蔽聰明于方冊文辭之間不知反身入徳之要仁義禮智根于心而措于事業致懵昧于理亂之機顛冥于進退之義道大悖矣而不知返也嗚呼間有懷才抱器知學逹本之士可與有為而湮沈下僚無所遇合且覬其逢不幸短命死矣可不為之歎息哉吾友戴君明仲是已明仲資秉剛明少而有立嘗從洛陽程氏問學知聖人之道近在吾身退而隠于心合于聖人之言若自有得方且沈涵充擴日進而未已優游鄉黨期以有為于世而年纔三十有七奄至大故嗚呼真可謂不幸也已君之弟迅狀君平生世次曰君諱述温州永嘉人曾大父某大父某父某皆不仕君為童子誦書日數千言為文操筆立成從人受學未幾已盡其能輙棄去肄業鄉校較其藝常為諸生先因去逰京師試廣文館時趙丞相主文柄得其所試業異之意其為老儒先生擢異等而君未冠也由是知名京師以為太學士皆科舉口耳之學為未至于是益逰四方求古所謂為巳之學尋居父喪寢食如禮廬墓終喪中元符三年進士第調婺州東陽縣主簿吏裒私錢完公舍以待君至得狀悉以俸錢償之州徙君監銀冶君以去疾弗獲因慨然賦歸去來詩十首以自見投檄而去邑人爭挽留之君徐譬之曰仕宦顧當擇地耶乃奉親屏居里中優游累年闔門讀書若無仕進意㑹州置學官選為臨江軍軍學教授部使者交薦其能俄以母憂解職居廬哀毁得疾以卒時大觀四年三月癸卯也妻同郡劉氏右諫議大夫安上之妹子男二人顒穎女三人皆㓜君孝友直諒挺然不可屈折世儒或訾其太髙博學精識議論古今審至嘗自許欲有為于世盖于其小者不屑就也不幸短命不克盡其才以死有志之士莫不為之太息出涕病且革無一語及私顧妻子在旁無憐色嗚呼可謂難矣其逰同郡林定為哀君之文亦曰明仲盖吾鄉之益友也初舉廣文館進士未試于禮部喪其親鄉人謂戴氏有子將于此乎觀禮明仲不惑于老釋陰陽之説居喪哀毁不食菜果既葬廬于墓側無一不如禮者鄉人翕然稱之登第調婺之東陽縣主簿有所不合賦歸去來十首投檄而歸㑹行三舍法選用師儒復出為臨江軍軍學教授丁母憂得疾于倚廬醫曰是疾也不可以風盍遷諸内明仲不可曰疇昔之夜吾夢焉有告以生死之説吾其止于此乎居六日而卒嗟夫生死亦大矣而所守如此則夫用舍行藏之際其肯動心于刑禍利祿而輙變其操耶盖其天資過人逺甚自少時為文已為先生宿儒所驚異益廣以學則隆禮篤孝不交流俗議論超邁器業不羣將以大用于世也不幸而止于此其命矣夫明仲樂人之善而少所可辱與定游乆其亡也哭之哀故又為詞以哭之創大厦之崇髙兮非一木之能支涉長流之浩蕩兮豈芥舟之所宜致黄唐于兹世兮匪大人而曷為嗟聖賢之難偶兮或異世而參差幸皇明之在御兮誕圖任于臯夔彼蹈襲之為學兮邈層霄而管窺望古昔以並驅兮足次且而莫階美夫人之智及兮復勇義而弗疑蹈中庸之正路兮喟末俗之多岐氣邁往而莫屈兮肯折腰于夸毗坐藝圃以導道兮將舞雩而浴沂何命極而至此兮亶閔凶而獨罹又神聽之昧昧兮仍疾疢于荒危豈吾喪之不勝兮守禮經而弗移夢有神以來告兮實明者之前知痛才難而莫贖兮撫世儒而孔悲晝惻惻以忘食兮夕太息而不寐寓斯文以告哀兮匪交情之獨私政和元年六月丙午其家舉君之柩葬于郡之西山太夫人墓之次以行已為同學來請銘顧二君之言其文義皆可傳乆于是并著之而為銘云何子平墓誌銘客有服喪者貿貿然來拜伏涕洟興揖而言曰恕嘗獲私于吾子今也不幸恕之先君大故恕不敢死以圖卒大事今既有期敢來請銘客余同學生也不得辭于是叙而銘之曰君姓何氏諱某字子平世為温州永嘉人先無顯者自父祖以來皆以利術厚其業君生長其間心習氣染若不學而能及壯即多就舉貸行賈江湖間初不利愈苦志經度盡知四方物色良窳多寡與其價之上下用是子錢稍稍登本迺益羅取衆賈所棄時其鈍利為之出入人家緩急須索百物無不有物直常數倍遂致累資千萬稱于大家亦其平生直諒用心勤乆之效非特智術然也余觀司馬遷載古之貨殖若陶朱公師史之徒皆智度加于常人然後能各就其所欲為雖利道不一要其行事與君操術略相似可以為理生者言也君初娶胡氏生二男子曰思曰愿皆先卒後娶鍾氏有男一人元祐八年三月乙未以疾終于家年七十三將以明年正月壬午葬于州城之西南吹臺鄉斷塘里銘曰初艱而後贏利之經生勤而死寧道之徴尚者能能而不尚者其不能嗚呼子平朱君夫人陳氏墓誌銘杉橋朱氏者有厚徳能仁其邑里其祖有名錢者里人為諱之不曰錢而曰金帛至今不改此豈有禁令服從哉某女弟歸其來孫昌年嘗見其父祖輩行多髙年長者粹然淳古皆有温良之氣而女弟歸寧亦毎稱其家人女子皆雍睦㳟順無間忌之行于是昌年母陳氏為嫡長婦能身服其善訓以佐助其夫子凡所以善宗族周貧乏悉如其上世所為雖中年寡居亦守此不懈所以及今人皆稱其為良家善族亦其天資淳懿與其父宿學長者素所教訓之力與朱氏為一時之㑹也夫人父諱某夫諱某皆温州平陽人有男子七人長某嘗舉進士次二子從釋氏又其次某為太學生有聞皆先夫人卒他人所不能堪而夫人無深念甚憂之色非忍也寛故也比終獨季子昌年昌晨當後事昌年賢嘗為政和二年貢士人期以起家者也女子一人為尼名戒學夫人年十九而嫁四十八而寡七十五而卒卒以政和四年三月乙巳是年十二月丙午葬于其鄉金山之原服喪者有孫男八人重孫男三人以為福善之報云銘曰一夫為善一鄉所歸一婦為善一家所宜人孰無善胡莫弗為從義則利從利則虧銘以告之守此勿隳鄧子同墓誌吾之友鄧氏子諱洵異字子同元祐五年五月二十四日卒于京師越六月五日某至自洛即其殯哭之已而語諸人曰哀夫吾子同之亡也夫道之不明天下學士淪于流俗以聖人書為發䇿決科之具父教其子兄詔其弟師傳其徒莫不一出于此雖有良質美才生則溺耳目恬習之事長則師世儒崇尚之言至頭童齒豁不知反一言以識諸身而子同少年敏發于此獨知有所謂聖人之學之要目之所視耳之所聽口體之所安無不學也其志蓋將誠于心而達之天下嗚呼孰謂吾子同之亡也夫子同生二十二年監綾錦院祕書丞諱良之子贈朝請大夫諱至之孫大夫君居鄉動有禮法祕書君為中牟令有聞宜有是子也而亡之命夫是歳冬十二月其兄將舉其柩歸將以某日葬于許州陽翟縣某村某山鄧氏世為成都人以其世父龍圖君貴遂徙居陽翟子同之葬祔先塋也永嘉周行已誌葉君墓誌銘葉生漸從予逰刻勤有志向父死且葬屬予銘嗚呼夫人有子擇術業儒義方孰大于是葉君名芳也居温州永嘉也業吏也娶諱也子洙與漸也生寶元己卯十月乙酉也死崇寧壬午五月癸亥也葬其居㑹昌湖也死之明年十二月庚申也銘曰人而弗儒懵懵其趨儒而弗居懵也如初而充而儒君子儒乎周君墓誌銘永嘉有隠君子者姓周諱某字彦通故司封員外郎集賢校理某之子初校理以恩得補一子官君居長避匿鄉里弗肯出校理殁資産貨財一無所取蕭然獨結廬于謝公山之側治園居閒未嘗交俗歳常蔬食日從佛者希淨逰鄉里親戚推其忠信篤敬過其門知其為隠者之居也入其室知其為君子之人也至啓手足又知其從淨公之有得也生五十七年卒于崇寧四年六月之庚申葬于五年十一月之丁酉其居郡之登瀛坊也其葬瑞安縣之魚潭山也娶同郡陳氏生男二人女二人銘曰卻榮而弗攖去利而弗爭恂恂然退若無所能心平氣和獨與道成是為君子之徴浮沚集巻七
