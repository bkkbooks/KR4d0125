body:
  text: 浮沚集巻九宋周行已撰五言律詩上元被差監酤妙覺書呈文叔二首密雪沾游幕餘寒犯酒茵坐招羣客飲愁是獨醒人事業慚知己衣冠媿此身吾生自有分休問紫姑神竊祿知踰分論才昧所長幸同操犢鼻幾不試漁陽醉客或遭詬少年來索嘗此吾稽古力咄咄未須忙走筆問訊晁四以道問訊晁夫子成州去幾時衣冠空攘攘鬢髪獨絲絲器業終難合行藏只自知嵩山讀書處還許寄晨炊故鄉羣盗阻不見一人來免死依君祿全生抵酒杯衰年聊爾耳吾道已焉哉未遂鹿門去相思日幾囘寓居婁氏樓居樓髙雲隠户秋静月侵幃曠宇涵天界連山軸地機宿鴉風葉亂歸牧笛聲稀身世浮雲外人生何所依遷居柳市有感緬懷彭澤令從借剡溪居水漫衆流㑹山連夜逕疎閉闗非避世為道乆忘書乍愜幽棲趣永欣塵鞅除羅含亦有宅洲渚啓柴門未足拒風色猶堪隔世喧卜居空著論畢娶詎忘言且折薛中劵相從籬下樽臥病京師䝉少伊察院惠米因叙歸懷奉呈臥病逾三伏辭鄉已四年故人分祿米鄰舍貸醫錢志業其如命行藏休問天吾歸舟已具老去合求田再依前韻酬少伊亦有南堤宅棲遲可寄年免從依廡賃賸得買鄰錢為道難逢世知吾獨是天小橋連里巷行日話桑田次少伊韻反招隠伏䝉少伊察院和篇有招隠之句夫言歸者衰病之所慕也公方振職臺綱四方想望以為重詎可云乎爾輙次元韻反招隠以復之我已逾衰齒公猶小五年少時能作賦平日不言錢風采桓公雅詩情白樂天朝綱方有賴未可話歸田少伊察院再用年字韻寵示二篇輙復酬和一章陳徳一章叙情恂恂許御史清譽自初年門絶苞苴使家惟薪菜錢文章名盖世忠義力囘天不為兒孫計何須僻處田咄咄休無賴栖栖又一年時從柱下史獨貸薛中錢多病惟須藥長貧不怨天歸期無逺道猶滯稻粱田雨後晨出滎澤道中寄嘉仲明府宿雨郊原潤新晴禾黍香天髙晨氣静地闊野風凉忽忽憂羣盗悁悁懷故鄉攝官聊免死何敢論行藏謝嘉仲相招寄居滎澤已解陳蕃榻仍留杜甫亭飽聞期月政願受一廛氓萬事尊中酒餘年水上萍依投知有地流轉任浮生送李子興新第歸寧新恩好驥子門户有輝光昏宦通三世山川共一方拜親今綠綬傳業自青緗買宅如來此相從及早凉寄題江南李氏四照亭聞道新亭好開軒四望虚葱葱佳氣合衮衮衆山趣野鳥來還去浮雲巻卻舒登臨富幽興應不羡陶朱道中有感皛皛平川静暉暉寒食曛連山荒白草屬地亂黄雲歳晚闗心事天邊為客身扁舟終不惡奔走失吾真次渠僅老韻四首癡拙時無用歸來老罷休夜寒為客夢歳晚異鄉愁鳥有南枝宿川皆東海流凭髙望歸路雲重失滄洲世事人情了年華鬢髪侵平生憂國淚老去戀鄉心四壁家千里三秋書萬金號寒小兒子念汝故深情鳥暮已歸宿吾今行亦休百年能幾許萬事不勝愁貧賤須行樂功名可枕流鱸魚秋興逺風起白蘋洲憂患功名晚塵勞歳月侵愁來無與語老去獨傷心不復周公夢寧須季子金題詩慿遣興情極恐言深次李滎澤韻已罷仍僑寓雖貧强客羞閒居非素隠髙臥得清秋故國今何在他鄉未免憂為儒生用拙老去更宜休宿大足寺塵埃得古寺突兀亂山中疊徑僧居僻懸崖鳥道通塞雲常雨雪山木自多風萬事浮生外心花發暮鐘送左與言赴杭司錄艱難惟義重去住各愁深喬木迷歸夢孤㠶伴客吟相看憂國淚獨立望鄉心到日如無事來書速寄音晨至石碣院時喪女殯此院二首蕭寺來人少祇林過雨清日光微破影雲色未全晴乆客嗟殊俗中年哭後生庭前空柏子此意復誰明曉色初明野雲容尚隠林蒿萊三徑拙鳥雀一枝深憂患他鄉淚淹留故國心平生丘壑趣衰謝媿同襟送王天粹登第歸王氏青箱學名家千里駒朝廷求士急吾子應時須上第人皆有髙才世乆虚别君誰暖眼書信莫令疎奉和林惠叔攝邑聊觀政無才可及人案書捐吏役簷日遂吾真聽説桑麻好懽言雨露新貧居願時熟聊試甑中塵世間同大宅何處是安居臥地有知足棲巢亦晏如松楸懷舊隠城市逺先廬衰病難堪責交遊喜漸疎書王仲元都廵城上小亭王子吹簫處孤城城上臺囘囘衆山入隠隠一川來花草三春合軒牕四面開得官兼吏隠端復謝塵埃原武喪女有感人世刹那頃汝身能幾秋一生如夢了萬事盖棺休年老不禁哭夜長都是愁棄置復棄置千古共山丘飄零同逆旅生死異前途恩愛此生斷聲容昨夢餘幻身今墮甑戲事已陳芻寂滅真為樂勞勞得爾如秋霽分韻得中字清晚搔頭望晴天已不同霽烟才冉冉雨意却濛濛為客艱難裏思親涕淚中獨慿心事在倚杖看鴻秋春日郊行野歩春郊淨佳遊病眼開風流可憐桞零落不堪梅水接仙舟泛山紆俗駕囘歸歟月已沒餘興更登臺聞官軍㨗報呈彦升時仲滯雨春惟冷端憂夜更長曲肱思已亂如面世難防㨗報聞平宼安書喜到鄉鹿門心未遂誰與論行藏五言排律壽郡守僊系蘓門遠英流富緒長胚胎潛間氣庭玉焕祥光永日輝南陸融風麗北堂綵餘長命縷香剩浴蘭湯丹穴皆威鳯荆山必豫章精神森秀發器質儼温良懿學傳經濟嘉猷合贊襄慶流多顯赫筮仕早騰驤遊刃無間劇提衡絶否臧髙情薰愛日勁節肅清霜暫借朱轓出行看皂纛揚頌聲喧道路輿望屬巖廊時遇生申旦官臨指李鄉衆真金闕奏滿郡玉爐香强仕春秋富昌朝事業芳臣千君萬夀賡載濟時芳原武祈雨有應呈諸同僚嗷嗷憂旱魃懇懇叩神祠自疏官多曠無辜歳莫饑竒峯俄變黑甘液遽如篩雷電寧無物風雲自有師荒郊囘沃壤榮穗發萎枝攝邑乖為政同僚實副時民心惟禮義邦本繫安危食足無他事恩餘及我私白看雲子粒滑想杜陵匙拂拭萊蕪甑香炊定可期七言律詩夀沈守三甲三壬五福俱胸中落落貯瓊琚池塘芳草詩情逺富貴浮雲世事疎一郡夀爐薫愛日層霄仙籍寄真書君王萬億臣千億永作天官拱帝居夀時相三首皇天祐徳必生賢尊主功髙五帝前嶽骨昴精來間氣彭齡𣆀夀與遐年逺無憂患身先退近有湖山樂更全秖恐蒼生須謝傅毎聞人誦衮衣篇毎聞人誦衮衣篇又值君臣慶㑹年臘雪已先調鼎實春風還是作霖天經綸道自心源出損益時隨世變遷當宁旰宵懷舊徳非公誰與濟商川非公誰與濟商川年徳俱隆文武全省事省官民自定足兵足食務當先烹鮮取治惟無擾置器期安在不偏公夀且千君且萬四方永永樂堯年次僧曇隠謝見臨韻二首倦雲小息五公山來往扁舟勝據鞌强飯未能追馬革寄餐端恐識猪肝山泉周匝流清泚古木森羅照屈蟠獨臥北牕懷太古元無一物到門䦨隠跡僧居無所為蒲團曲几面清池一身有累須三逕萬物無私各四時心與溪山相宛轉事隨塵世漫紛披山中不用詩招隠已約施巖采紫芝几山出示陽橋唱和諸什竊慨英才之沈寂光景之流邁因兩次其韻皆以少日為篇首一以贈監鎮孫和仲一以贈知丞苖几山云少日稱豪弓馬塲時平不復戍漁陽引杯看劍夜雲黑横槊賦詩寒日黄霜落草枯閒戰騎位卑祿薄困征商白頭未試吳王妓楊柳蕭蕭古道傍少日稱豪筆硯塲一官家近住河陽人情易變春雲薄世故飽諳秋鬢黄寒日蒼凉臨迥野浩歌悲壯激哀商時平民樂官無事醉倒題詩舞袖傍子固嘉夫相過觀几山唱和萬事都將笑一塲不如載酒訪髙陽凍消地靣可憐綠日暖楊枝無奈黄尚徳乆從君子魯言詩仍有起予商太平無事閒居樂且醉髙樓大道傍再和子固老年不入少年塲不似當時在洛陽福善坡頭囘曳練石家寺裏看姚黄春風楊柳東西陌古道樓臺南北商流落如今歸未得白頭憔悴巻城傍嘉夫再有冰玉交輝佳句復和酬報爛爛雙瞳掣電光照人皮裏有秋陽誰將鼠腊同蒼璧枉把鹽車服乘黄合有猷謀陳稷契即看灝噩繼周商近來佳句驚人甚敢竝蒹葭玉樹傍和李文叔見招杜曲林泉可寄年功名富貴有危顛囊中佳句渾輕與海内名方莫浪傳赤脚拏舟能楚些明眸度曲解回旋且過叔度留終日未問他年騎錦韉再和文叔事業功名看百年千杯醉墨謾張顛闗西夫子時方棄稷下諸儒誰與傳契闊十年纔道舊間闗千里又言旋飄萍斷梗無根柢愁唤羸童理破韉病中思歸呈千之十七兄白首遑遑謾世憂我今問米下揚州支離病骨難堪暑浩蕩歸心不待秋兵火彫零餘故里功名衰謝獨扁舟腐儒老死終無用收拾綸竿好去休再用前韻趣歸故鄉何處海東頭地盡東南最勝州水陸歸程幾百驛風塵囘首恰三秋無才北使能降敵决意東歸已辦舟去國不緣明主棄只緣多病更宜休和孫徳平病秋思歸春雨秋風無盡期鳶飛魚躍各天機年光逝水催前浪世事浮雲換白衣草木變衰知節改田園蕪没要吾歸人生萬事惟心可真處何妨世俗譏奉和知丞苖几山時几山以謗被劾陸沈僚底網騤瞿玩世滑稽常自如鞍馬猶堪供矍鑠功名誰復念居諸胸懷金玉天知我仕宦風波丞負予尊酒夜闌聽軟語清談笑謔極羣書和使君閔雨布榖催耕候已深驕陽未肯化為霖一年鈴閣傳齋禁三月花時負賞心空谷靈湫能奮響叢祠古木已成隂時取九華龍水又禱西祠侏儒飽死渾無計屬耳頽墻聽雨音次胡志衡韻城北城南春𣺌然幅巾藜杖望晴天何須多事途窮哭莫倚髙才甕下眠渭水來從鳥鼠穴隴山真接首陽巔登臨未盡牛羊下安得羲和叱馭旋和蔡八十約同歸十年塵土送春衣毎見春風憶翠微射策決科知已誤求田問舍早須歸人生豈料長身健行李還應與願違遙望故山心獨往杖藜三嘆暮雲飛再和蔡八十約歸聞説尋山意已清况逢佳客作山行百年心事同杯酒萬里春風出帝城秋燕欲歸棲集穏春鷗無事往來輕風流定是輸陶謝應笑癡人似步兵五言絶句蘭溪驛小雨滋春態餘花落晚香扁舟還獨往誰與論行藏姑射仙人易簡乾坤理和平兆庶情誰知為帝力萬國自生成魯直帖秀潤瞻眉宇清真接話言端能愈吾疾已覺意超然李端叔帖鐵靣黄犀骨霜髭燦蝟毛晚年聊混俗猶不廢稱豪米元章帖戲事芻陳子浮生甑墮休遺音餘翰墨人尚想風流七言絶句和丁忠節三首絶廬髙隠白雲間徳行人知是閔顔側席求賢新詔黑肯教夫子乆居山七十稀年幾許閒星星鬢髪半衰顔寸心灰盡周公夢不戀朝衣只戀山大儒出處自無心調燮功髙利物深用舍行藏皆是道不分朝市與山林送禪照大師四首常寧隠子書來告行隠子喜文而未及道是行也將求師而問焉友人林惠叔贈言有脱鞋之語隠子疑曰薄之甚矣非也予因述其語贈行且解按劔之疑海鴈年年自往來迢迢此去幾時囘春風滿路真消息應是桃花處處開千峯如畫不安排的的天然更莫猜草碧花紅春鳥呌此中何處問如來行行識取靈巖路多少遊人只麽囘門前有箇擎天柱千萬歸時帶取來脱却多年破草鞋脚根步步踏如來昔人根鈍真堪笑直待血流方始囘知趙鼎臣贈呂令二首幕下胸中水鏡寒否臧定不失毫端要知四海皆兄弟莫作前人青白看坐衙官似坐禪僧萬物風行自飲冰縱解他心無所得不知何處計才能偶書楷老帖後楷公不見十三年何處髙談洞下禪禪裏相思無是處不相思處有誰傳春日五首送春小雨作輕凉碧瓦鱗鱗動霽光紫燕銜泥歸舊屋黄蜂採蜜度斜陽小牕午枕夢初醒特特來尋春徑行晴日暖風無俗客岸巾柳底聽新鶯蛺蝶尋花經竹過蜘蛛結網趁絲行簷前飜翼頻來燕葉底窺人欲去鶯深院囘廊春日長晴絲冉冉暖浮光五株恰似陶彭澤滿縣愧爾潘河陽無賴春物惱人愁百年心事信沈浮何時買得㑹稽宅蠟屐自作烏衣遊元日同麻萬紀王振叔行南寺五首正月一日思悠哉水邊盡日意遲囘豈無俗人一盃酒不作區區城裏來岸頭欣欣木向榮岸下涓涓春水生晴日暖風無俗客故尋野徑逐溪行寒風昨夜動天起春色今朝入眼濃橋北斜斜柳垂綠岸南細細草生茸南寺橋頭緩緩歸郤來髙閣更遲遲水邊白鷺雙雙立樹杪烏鴉箇箇飛出自西門入北門南迴東轉逐村村輕黄淺綠飽經眼卻得歸來細細論哭呂與叔四首平生已作老藍川晚意賢闗道可傳一簣未容當百漲獨將斯事著餘篇淹留也復可疑人不向清朝乞此身芸閣校讎非茍祿每囘髙論助經綸朝聞夕死事難明不盡心源漫乆生手足啟云猶是過黙然安得議虧成朝廷依制起三王歎惜真儒半已亡猶有伊川舊夫子飄然鶴髪照滄浪睡起偶書二首晴日薫人午睡迷輕舟小楫夢中歸覺來搔首牕前立草綠花紅燕子飛爐香一炷滿牀書野杏山桃三四株食罷睡餘還獨立一身此外復何須瀟湘暮雪凍雲垂地雪紛飛日暮天寒鴈已歸猶有江頭問津者不知此去欲何依春閨怨三首春盡遼陽無信來花奩鸞鏡滿塵埃黄鶯恰恰驚人夢欲到郎邊却麽囘深院無人簾幕垂漫裁白紵作春衣停針忽憶當年事羞見梁間燕子飛燕子引雛來去飛楊花漠漠草萋萋牕前睡起渾無緒倚遍欄干日又西示負書平生萬巻漫多聞一悟中庸得本真從此盡將覆醬瓿只于心地起經綸留題祇陁僧房回舟小息取僧房一枕春風意味長江上鵓鴣啼雨罷隔洲烟樹日蒼蒼從姚毅夫乞酒春來不飲動經旬空戴陶潛漉酒巾風雨惱春愁獨坐提壺無事故撩人示提壺藜杖芒鞋一幅巾翛然無事可闗身一壺任醉春長在南北東西作主人武陵烟雨桃花流水武陵源烟雨冥冥暗一川試問山中避秦者不知此景是何年浮沚集巻九
