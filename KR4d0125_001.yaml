body:
  text: 浮沚集巻一宋周行已撰奏議上皇帝書臣竊謂人臣之私莫大于朋比而天下之患莫深于壅隔古之人君所以操獨斷而任賢使能廣羣聽而明目達聰蓋防此也恭惟陛下臨御以來總攬權綱勵精政事官無大小事無巨細皆出宸斷親御翰墨臣庶奔走而聽命海内歡忻而蒙徳十二年間法全而令具治定而功成然則天下既已無事矣臣愚過慮竊意萬幾之繁乆勤宵旰臣願陛下儲精蠖濩游意太清小職細務責之三省百司而獨操其要者在于察股肱之任必出于公使無朋比之欺擇耳目之官咸竭其忠使無壅隔之患如此則職何小而不舉事何細而不聞不待悉煩聖慮而天下之理得矣臣愚不勝區區螻蟻之誠上皇帝書臣聞忠臣雖在畎畝不忘其君志士雖無其位而憂在天下何則君臣之義出于天性天下之人同于一體是以伊尹耕于有莘而自任以天下之重仲尼孟軻身為匹夫而汲汲皇皇彼皆遭非其時猶欲使其君為堯舜之君使其民為堯舜之民孔子亦曰如有用我者吾其為東周乎孟子亦曰豈徒齊民安天下之民舉安况臣生逄盛世身事明主豈不願陛下享天下之安天下同陛下之樂承祖宗深厚之徳澤固萬世無窮之基業而臣尤以為幸者以陛下性體帝堯之仁躬行周王之孝有大舜取人為善之大徳有成湯改過不吝之誠心加之以欽明文思之聖學允恭克讓之懿行是以手詔每下天下無不感悦雖遠方窮僻之民皆知陛下之為聖主也然而天下之民猶有不得盡被陛下之澤而經國之術猶有不得盡如陛下之意者豈非有司議法之過官吏行法之弊乎臣讀昜得其説曰天地之大徳曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義今陛下有天地好生之徳居聖人大寶之位守之以仁行之以義而臣下未有稱陛下之旨任天下之責者夫守位莫大于得人心聚人莫先于經國用此誠陛下今日之所留意而已行之矣然臣猶有區區之説者誠謂更化之際古人所難調一之道必有其要故臣為得人心之説有四一曰廣恩宥二曰解朋黨三曰用有徳四曰重守令為經國用之説有六一曰修錢貨之法二曰修茶鹽之法三曰修居養安濟漏澤之法四曰修學校之法五曰修吏役之法六曰修轉輸之法臣所謂廣恩宥者誠謂陛下前日聽任之過法度或有未便刑罰或有失中天下雖知陛下之徳而行法之吏不無失人之心臣願陛下曠然為盛徳之舉下責躬之詔其意若曰迺者失于聽任法度過差恐吾民至有陷于非辜賢者或有廢而未用人失其所澤不下宣因推應官吏軍民之在罪籍者無輕重悉使自新如此則天下之人孰不懽然交悦益知陛下之為聖前日有司之為過也臣所謂廣恩宥為得人心之術者此也夫然後除其黨籍勑戒有司應今赦以前不得復論繼今以後不得復以朋黨為言朋黨之論誠非國家之利也夫一身内有九族之衆外有婚姻之黨又有朋游之好一家十人十家百人百家千人以一人失職千人懷戚一口傳情萬口傳聲陛下誠能念其前事之已往歳月之已乆所言失當者或出于忠誠之憤激所為繆戾者或出于愚暗之無知天下樂生之情同于昆蟲何所不愛陛下好生之徳同于天地何所不容臣願無問罪之輕重時之先後人之邪正悉因大霈一切釋之兩解其黨應前任宰相執政者與之三京四輔前任侍從者與之帥府望郡前任臺省官者與之列郡餘官各隨資任聽其仕進已亡殁者悉復之有恩賜者悉還之如此則人無懷疑下無失職之歎幽明咸被其澤賢愚各得其所囘千人之憂戚為四海之懽聲臣所謂解朋黨為得人心之術者此也臣所謂用有徳者臣誠謂天下之人有有徳者有有才者有才徳兼備者操行無邪持心近厚所謂有徳也人所不能而已能之所謂有才也才徳兼備者上也有徳而無才者次也有才而無徳者又其次也無才無徳斯為下矣故曰賢者在位能者在職又曰任賢使能所謂賢者有徳之謂也所謂能者有才之謂也賢者在位則朝廷尊朝廷任賢則天下服夫為徳非一日之積也徳成而信于人者又非一日之積也臣願陛下博選耆艾參用舊徳蓋耆徳之人知古今之多閲世故之乆必能為陛下稽古愛民必不為陛下妄作生事而又天下之所素知人心之所素服用之于一方則一方之民悦用之于朝廷則天下之民悦陛下能用民悦之人是陛下得民之悦也臣所謂用有徳為得人心之術者此也臣所謂重守令者誠謂天下一家萬民為本積縣為州積州為國縣不得人則為陛下失一縣人之心州不得人則為陛下失一州人之心國不得人則為陛下失天下之心是人心者為州縣之根本州縣者為天下之根本今朝廷之上選賢用能而州縣之任未嘗選也資攷應吏部之格者可以得也朝廷以為不才而黜逐者可以得也夫朝廷以堂選為重吏部為輕而郡守縣令以吏部得之是州縣之任輕于朝廷也朝廷以進用為才黜責為不才而郡守縣令以黜責得之是朝廷輕郡守縣令之任也臣願立守令之法重州縣之任應今後朝廷之黜責者不得任郡守縣令朝廷之選用者必自郡縣守令選除如此則守令知自重而不敢害吾民民知上愛我莫不懷上徳臣所謂重守令為得人心者此也臣所謂修錢貨之法者其説有三一曰當十二曰夾錫三曰陜西鐵錢夫錢本無用而物為之用錢本無重輕而物為之重輕此聖智之術國之利柄也臣竊計自行當十以來國之鑄者一民之鑄者十錢之利一倍物之貴兩倍是國家操一分之柄失十分之利以一倍之利當兩倍之物又况夾錫未有一分之利而物已三倍之貴是以比歳以來物價愈重而國用愈屈為今之説者不過曰官既能鑄聽其自輕重又不過曰如慶歴之法以漸減其分數此二説皆不可也夫盗鑄當十得兩倍之利利之所在法不能禁也自行法以來官鑄㡬何私鑄幾何矣官鑄雖罷私鑄不已也私鑄不已則物價益貴刑禁益煩而物出于民錢出于官天下租税常十之四而糴常十之六與夫供奉之物器用之具凡所欲得者必以錢貿昜而後可使其出于民者常重出于官者常輕則國用其能不屈乎此一不可也慶歴之法前日行之東南是也自十而為五自五而為三自三而為小鈔自十而為五民之所有十去其半矣自五而為三民之所有十去其七矣小鈔之法自一百等之至于一貫民之交昜不能悉辨其真偽一也輸于官而不可得錢二也是以東南之民不肯以當三昜鈔而盡銷為黄錢此前日已行之弊也然而所以得行者尚以改鑄之日未乆散于天下者未多况今公私之鑄日乆併于五路與京師者日益多其可復如前日公私有五分七分之損乎此二不可也然而當十必至于當三然後可平夾錫必併之然後可行陜西鐵錢必通之然後可重臣之説欲宫出進納誥敕與度牒紫衣師號見錢公據六等以收京師五路當十隨其錢數物直平昜之其有奇零不及數者則隨其多寡填給公據許得貿昜若自便于𣙜貨務算請諸路鹽鈔以一季為限于是悉以所得當十樁管逐路或上供京師隨其所用改為當三通于天下國家無所費而坐收數百萬緡之用其利一也公私無所損而物價可平其利二也盗鑄不作而刑禁可息其利三也然而六等之説所出既多則必停壅不售停壅不售則其直必減其直既減則公私或損臣欲進納前日之給綾紙宣帖者悉更為誥敕而度牒紫衣師號悉用黄紙自法行之後應官司惟得書填今來進納誥敕及黄紙度牒紫衣師號候畢方得書填舊降文字如此則無停壅之弊價輕之患矣此修當十錢之法也夾錫之弊其行未乆輕于銅錢三之一十三當銅錢之十臣欲併于河北陜西河東三路陜西鐵錢之弊其積已多輕于銅錢一之十五臣欲通于河北河東兩路蓋錢以無用為用物以有用為用是物為實而錢為虚也故錢與物本無重輕始以小錢等之物既定矣而更以大錢則大錢輕而物重矣始以銅錢等之物既定矣而更以鐡錢則鐵錢輕而物重矣物非加重本以小錢銅錢為等而大錢鐡錢輕于其所等故也何則小錢以一為一而大錢以三為十故也銅錢以可運可積為貴而鐵錢不可運不可積為賤故也以其本無輕重而相形乃為輕重故臣之説欲併夾錫與鐵錢通行于河北陜西河東三路而禁使銅錢其三路所有銅錢許過銅錢路分行用其京東京西兩路夾錫錢許過鐵錢路分行用若河北陜西河東行使銅錢京東京西行使夾錫鐵錢與銅錢之入三路夾錫鐵錢之入餘路各論如私錢法如此則鐵錢與物復相為等而輕重自均矣陜西鐵錢幾廢而可以復行其利一也銅錢不流于敵國其利二也敵人盗鑄而無所復用其利三也其或鐵錢尚輕物價尚貴又有二説以濟之鐵錢腳重轉徙道路不便于往來一也拘于三路而不可通于天下不便于商賈二也臣欲各于逐路轉運司置交子如川法約所出之數樁錢以給使便于往來其説一也朝廷歳給逐路糴買之數悉出見錢公據許于京師或其餘銅錢路分就請以便商賈其説二也前日鈔法交子之弊不以錢出之不以錢收之所以不可行也今以所收大錢樁留諸路若京師以稱之則交鈔為有實而可信于人可行于天下其法既行則鐵錢必等而國家常有三一之利蓋必有水火之失盗賊之虞往來之積常居其一是以歳出交子公據常以二分之實可為三分之用此修夾錫鐵錢之法也臣所謂修茶鹽之法者臣欲幷酒法而總其鹽鈔算請之數買茶搭息之數𣙜酤淨利之數坊場買撲之數通天下五等而三之為上中下十有五等歳各出緡若干一切弛其禁令使民自便國省官吏而歳入有常其利一也户出緡錢至少而得以自便其利二也小民各安其業而商賈得通其利三也姦盗不作而刑罰可省其利四也臣所謂修居養安濟漏澤之法者前日朝廷既常修之矣然其利未廣其費尚多臣誠欲廣陛下之惠息縣官之費謂應天下鰥寡孤獨之無歸者疾病之無養者死亡之無葬者宜令各許所在近便寺觀隨宜收養葬薶每通計及若干人給度牒一道如此則生養死葬者各得便一利也天下寺觀各得度人二利也官無濫費而獲實惠三利也徳澤益廣而可以乆行四利也臣所謂修學校之法者誠謂前日之法太煩而難守費廣難乆官有一歳四科場之勞士有五歳一應舉之患春季一試夏季一試秋季一試冬季一試官吏之勞紙劄之費悉如貢舉之法是一歳而有四科場也豈非官以為弊乎一試入縣學一年然後赴歳升再試入州學一年然後補内舍三試升内舍一年然後補上舍升上舍者歳終然後入辟雍入辟雍者遇大比然後得推恩凡此數者每試必得必有攷察必遇大比已五年矣而况試未必得得未必有攷察貢未必遇大比是又有七年之乆者有終身不得進者豈非士以為患乎臣欲廣陛下教養之意而覈其實簡有司選試之法而省其費謂宜州置州學教授一員命官充之選有學行者視其資秩為請給人從之數縣置縣學敎授一員舉人充之月給職錢五千學生之入縣學者不試不給食學生之入州學者初歳一試外舍取文理通者不限以數比歳再試内舍取外舍十之一三歳再試上舍取外舍十之一于是貢于太學太學總天下所貢之數而大比焉又取十之一乃奏名而官之應三舍生願在學與游學于外者聽其自便内舍以上官給食若在外犯公罪徒私罪杖雖贖及在學犯第二等以上罰者各不得預試每大比之後一再試如初法嘗預貢者免試外舍至于試士之法其弊亦乆人守一經無不出之題文為一格無甚髙之論以博學好古為迂闊以綴緝時文為㨗徑是以老成乆學之士未必得而後生淺聞之徒多預選臣謂宜革選試之法使人試五經大義各一條為第一場子史時務策各一道為第二場宏詞為第三場如此則才髙實學者無不遇之嘆而新進寡學者無濫得之幸是為今日學校之所養者必為他日三舍之所選今日三舍之所選者必為他日朝廷之所用學校益廣一利也攷選益精二利也士得自便三利也所費至省四利也臣所謂修吏役之法者其説有二以田募吏一説也以兵代役二説也以田募吏之法水田上等一頃中等一頃半下等二頃陸田上等二頃中等三頃下等四頃州縣每案募吏一人使世其職身殁聽以子孫家人承代試而後補犯枉法自盗贓者還其田别募隨其案之職務煩簡許保任書手一人至三人月給雇直三千犯枉法自盗贓者同罪餘罪輕重有差如此則吏得乆其職而可以責任一利也人知自愛而重犯法二利也民不受弊三利也雇直可省四利也以兵代役之法應州雇散從縣雇手力悉易以廂軍廂軍不足以禁軍其教閲更代差出各如本法即不得下鄉幹當公事如此則雇役可省其利一也兵無冗食其利二也臣所謂修轉輸之法者臣誠以為領使太煩轉輸不一財散而費廣權分而勢輕臣欲悉減諸司官每路只置轉運使一員使轉輸財賦按察使一員使察廉吏治皆以望重品髙者為之許各辟官屬分治其事如此則權一而事治其利一也官省而費輕其利二也凡此十説臣皆推原陛下仁聖之美意修廣今日已行之良法于當更之時順民悦之情定一代之典為萬世之利至于事之緩急行之先後法之纖悉儻蒙萬幾之暇留神聽覽或有可采别其條對出自宸衷斷而行之臣非敢懷邪而觀望希賣而幸進惟欲陛下受天命無窮之福天下安陛下和樂之政宗廟永寧社稷永固臣之願也表代郭守賀嘉禾表和氣薫蒸祥生嘉榖泰符協應慶及豐年凡在照臨孰不抃蹈恭惟皇帝陛下撫千齡之昌泰纂七聖之宏規繼述丕謨躬行周王之孝生成庶彚性由堯舜之仁毎推四海之咸寧不忍一夫之失所格顧成于宗廟膺眷佑于皇天休順大臻嘉祥並至惟農者為政之本而禾者得時之中上以供乎粢盛下以足乎民食秪園發秀匪同異畝之耕莖穗標竒且應充箱之實固將承福基于億載光瑞牒于前圖臣邈守遠籓預聞盛事竊仰聖朝之慶將圖國用之饒欣頌之誠倍越常品代郭守謝復職表代言西掖詞藻非長黜守東州政經無狀㑹逢恩宥洊復官資進升清切之班莫稱便蕃之命寵隨驚至感與涕并竊以典謨訓誥之書自唐虞而始見禮樂文章之政更秦漢而弗全洪惟治朝大興儒學纘寶圖而創閣昭累聖之垂文登延侍從之臣祗若祖宗之訓鋪陳帝制宣昭聖謨况先帝丕顯之攸居實方今紹述之所本列職禁近得預時髦如臣者憂患餘生江湖末系學類瓠而無用性匪石而不移守道衡門每有終身之志觀光上國偶為多士之先再試有司始階仕版間關州掾叨冒學宫緣坐罷官棲遲赴調謬以不虞之譽寖蒙上聖之知辟雍英俊之廛濫居師席學制教化之首參預官聯尋使事而復留階郎曹而被選以至執筆柱下掌誥省中歳幾九遷慮無一得皆由神聖之選不緣左右之容才分叨踰言章果及終蒙睿眷尚畀州符曾未期年盡還故職此蓋伏遇皇帝陛下乾坤廣大雖過必容日月照臨無幽不燭察臣文采不足立身無他憐臣樸忠有餘事君盡已故因鴻霈躐進華資持槖從班望堯階而雖遠分符郡寄奉漢詔以惟寅報稱實難麋捐無所浮沚集巻一
