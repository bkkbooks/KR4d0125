body:
  text: 浮沚集巻六宋周行巳撰雜著座右銘惟余之生兮父命以名謂余曰行已兮俾充夫性之所能曰汝立志必髙而宏曰汝學道必思而行待人過厚可以保生責已盡詳然後有成人惡勿記人善乃稱切磋琢磨孰無朋友惟善可親惟敬能乆聞過必改見善斯守誠心行此惟汝之有聖人何得不輕小善為無益聖人何長不恃小惡為無傷告汝以行已之道汝慎無忘嗚呼子乎年旣成人矣而行實迷其途嗟已往之無及念來今之可圖汝尚不守惟汝不孝汝尚無知惟汝無教敬之戒之久乃知效勸學文天地之性莫貴于人四民之長莫貴乎士士之所貴者以學而已然人皆有可學之性而或不得學者盖由出乎貧賤之家日迫于饘粥之不暇所以沈為下愚終身不靈以貽笞戮無所不至此人之不幸也諸生生于富有之家復賴父兄之賢使得從師為學一身亦幸矣然而父兄之所以願望于子弟者豈幸一身而已哉亦期于有成將以幸一家幸一鄉又推而廣之幸一國幸天下也當今太平之世不能力學期乎有成以幸一鄉一國而及乎天下以副父兄之顒望亦自棄而已語曰將相寧有種諸君勉之哉齋揖文學校者禮義之所起羣居不以禮則慢慢則善心日喪不善之心日滋君子小人于是乎分不可不念也故禮義之所始在于正容體齊顔色順辭令三者立身之要節而學有齋揖近或因循以為末節遂置而弗講謂徒拂人之情而無益于學者之事此甚不思也夫正者一歳之始也朔者一月之始也朝者一日之始也今吾徒羣居正必拜朔必賀而朝獨不相揖乎于其朝焉相揖以致敬問安否以致愛羣居之道也推此于朝則一日之敬愛不可勝用矣推此于朔則一月之敬愛不可勝用矣推此于正則一歳之敬愛不可勝用矣推此以終其身則一身之敬愛不可勝用矣嗚呼孰謂其無益于學也學也者學為人者也思為人不可以不敬其親思敬其親不可以不敬其身思敬其身不可以不敬其人日月逝矣一折枝之昜猶或憚而弗為則任重道遠終身其能勝舉乎此齋揖之禮所以不可廢也從弟成已審已直已存已用已字説周氏積德遠矣居温州者及其輩才五世由温州任起家者為江隂江隂生四十七年官司封員外郎職集賢校理而卒某甞恨其壽不充德位不登才意其後必有大興起者不在于諸父氏必在于爾伯仲間也成已于江隂為適長孫審已其次直已又其次存已又其次用已又其次旣皆以其父命得名于余又欲以成人之禮待之而字之于是因推其說而語其所以大興起其家之道曰爾亦聞有所謂君子之學乎夫古之君子為己而學為人而仕今之君子為己而仕為人而學何謂為己之學以吾有孝悌也則學以吾有忠信也則學學乎内者也養其德者也故為己而學者必有為人之仕矣何謂為人之學人以我為多聞也則學人以我為多能也則學學乎外者也利其聞者也故為人而學者必有為己之仕矣然則今之所謂君子者古之所謂小人乎爾于此焉亦將何擇吾甞觀夫孔氏之門其所以教人者多術矣至于樊遲學稼則不與子貢貨殖則不與子張干禄則不與是何也漆雕開不願仕則與之曽㸃浴乎沂則與之顔淵在陋巷則與之是何也嗚呼昔者孟子蓋甞推其本而言之矣以為舜與跖之分在于利與善之間夫天下之人何莫為善不必皆舜也而曰舜焉謂是心也無以異乎舜之心也不謂舜可乎天下之人何莫為利不必皆跖也而曰跖焉謂是心也無以異于跖之心也不謂跖可乎然則士之于此不可以不思也天下之人惟不知思是以善與心昧利與實滋于其學也不知為己而為人之為説于其仕也不知為人而為己之為利先逹之士比肩倡于上後進之士接武應于下父以是教其子兄以是詔其弟師以是傳其徒少習之長成之靡然成風蕩不可返此其甚可哀者爾于是獨可無思乎于成已字思仁爾則思之孰為仁乎孰為非仁乎惡乎而至于仁惡乎而至于不仁古則有之曰成已仁也成物知也曰君子去仁惡乎成名曰為仁由已而由人乎哉此其所謂仁者何也爾則思之曰欲成吾已者果不可以不仁也則又思之曰仁在我者也吾何患而不為哉于是朝焉仁也暮焉仁也食焉仁也寢焉仁也目視耳聽手舉足運無非仁也而後可以謂之善成已者矣于審已字思明爾則思之孰為明乎孰為不明乎惡乎而至于明惡乎而至于不明古則有之曰不明乎善不誠乎身矣曰大學之道在明明徳曰明則誠矣誠則明矣此其所謂明者何也爾則思之曰欲審吾已者果不可以不明也則又思之曰明在我者也吾何患而不為哉于是朝焉明也暮焉明也食焉明也寢焉明也目視耳聽手舉足運無非明也而後可以謂之善審已者矣于直已字思敬爾則思之孰謂敬乎孰謂不敬乎惡乎而至于敬惡乎而至于不敬古則有之曰敬以直内曰修已以敬曰毋不敬此其所謂敬者何也爾則思之曰欲直吾已者果不可以不敬也則又思之曰敬在我者也吾何患而不為哉于是朝焉敬也暮焉敬也食焉敬也寢焉敬也目視耳聽手舉足運無非敬也而後可以謂之善直已者矣于存已字思養爾則思之孰為養乎孰為不養乎惡乎而得其養惡乎而不得其養古則有之曰養心莫善于寡慾曰存其心養其性所以事天也曰以直養而無害則塞乎天地之間此其所謂養者何也爾則思之曰欲存吾已者果不可以不養也則又思之曰夫養在我者也吾何患而不為哉于是朝焉養也暮焉養也食焉養也寢焉養也目視耳聽手舉足運無非養也而後可以謂之善存已者矣于用已字思本爾則思之孰為本乎孰為非本乎惡乎而得其本惡乎而不得其本古則有之曰君子務本本立而道生曰天下之本在國國之本在家家之本在身曰大德不官大道不器大信不約大時不齊察于此四者可以有志于本矣此其所謂本者何也爾則思之曰欲用吾已者果不可以無本也則又思之曰本在我者也吾何患而不為哉于是朝焉本也暮焉本也食焉本也寢焉本也目視耳聽手舉足運無非本也而後可以謂之善用已者矣嗚呼成已者果以仁矣審已者果以明矣直已者果以敬矣存已者果以養矣用已者果以本矣則其學也吾必以為為己之學也必為善者也其仕也吾必以為為人之仕矣非為利者也斯所謂古之君子者也斯所謂大興起其家之道也書曰思曰睿語曰學而不思則罔惟睿惟聖惟罔惟狂夫聖與狂爾則擇之古之人名所以定其體字所以表其德夫豈徒哉爾或不思則名非其體也字非其德也吾之云云侮聖言也爾其勉哉論晏平仲越石父之責人也終無已乎脫之縲紲而弗謝一入閨而請絶何其嚴哉雖然石父以君子望晏子者也然非人之情也設于晏子可也惟晏子能受盡言而善改過孔子曰晏平仲善與人交久而敬之非此之謂乎書李氏事後夫善天下之所同也為善莫大于愛人為不善莫大于害人三代之得天下也以仁其失天下也以不仁非獨三代為然繼三代者莫不然唐之所以亡五代之所以亂蓋可知矣方晉開運之末五姓雲擾中原鼎沸盜賊蜂起天下糜潰極矣李氏以一布衣能屈賊人而保萬乘之衆此豈直智巧果敢而然哉亦其愛人之義有以動其善心故也故能革暴使之勿殺易貪使之勿取夫人之為不善至于為盗而殺人亦甚矣然而可以義動是知善者天下之所同也况不為盗而殺人者有不可與為善乎故為善無小可以保天下為不善無大不足以保一身為天下者皆知善之為善則唐不至于亡五代不至于亂中原不至于塗炭夫豈獨一李氏可以保其鄉里而為天下者不得以保四海以及其身乎嗚呼善與不善可以類求矣跋薛唐卿秦璽文李斯篆世傳為第一學者莫不愛之吾毎見其書幾不疾唾而郤走者何哉謂夫人善成其君之過也夫秦之君其資亦未若桀紂之惡之甚也而二三臣釀其君于不善則又有甚焉者嗚呼斯乎是甞去詩書以愚百姓者乎是甞聽趙髙以立胡亥者乎是甞殺公子扶蘇與蒙恬者乎是甞教其君嚴督責而安恣睢者乎使其璽不得傳者斯人也而其刻畫吾忍觀之哉顧唐卿猶區區珍藏之者豈不欲傳百世以為監歟吁是何以監也跋李文叔歐公帖世有君子小人猶天之有隂陽不能相無能相消長耳世用君子則不賢者遠矣世用小人則賢者遠矣朋黨之説所由起也昔慶厯之盛羣賢並用必有不得志者遂為黨説中之欲以盡去君子當是時蓋有自列為黨者有憂死其黨者然則果黨歟非也彼獨懼夫君子小人之分不明而國之理亂由此其出有憂之大忘其區區一身期悟當世之主此仁人之用心也世主欲知其説無他公與私而已矣出于公其道同非黨也出于私其利同黨也忘一已而憂天下謂之公乎謂之私乎斷可識矣由今觀古牛黨多小人李黨多君子然而以黨易黨所以必復必有憂心者然後可與議此文忠昔甞為之説矣觀此帖若有戚戚然者何哉詩云憂心悄悄愠于羣小其斯之謂乎跋李文叔蔡君謨帖近世士人多學今書不學古書務取媚好氣格全弱君謨正書多法魯公簡牘行草備兼諸體皆能冠絶一時學古故也然而以古並之便覺不及豈古人心法不傳而規模形似不足以得其妙乎馮先生辯或問馮先生參于某曰先生何如而子欲以為師乎哉某曰先生之孝于親友于弟雖舜亦不過如此而已吾不是師而將何師乎或者曰舜大聖人也後世無及焉而子曰先生之孝雖舜不過如此何也先生以參自名慕曽子猶以為不能及也而以為舜不亦過乎某應之曰吾所謂如舜者如舜之孝而已矣舜之聖固後之世未見其能及也夫孝自天子逹于庻人能盡其道者舉相似也曽子之于舜吾未見其有以異焉曽子之于孝以有曽晳者也舜之于孝以有瞽瞍者也二者之盡于孝是或一道也子固以為舜為聖人而其孝不可及乎曽子之不得瞽瞍而其孝不若舜乎吾竊悲今世之人自以為不若人也堯舜之後世之士皆堯舜之學也而曰不可及焉則不學而已矣顔淵曰舜何人也予何人也有為者亦若是有人焉而為曽子之孝其親者吾必曰曽子而已矣吾不知其不可及也有人焉而為舜之孝其親者吾必曰舜而已矣吾不知其不可及也或者曰子以為先生之孝果如舜舜漁于雷澤漁者皆讓居耕于歴山耕者皆讓畔而天下之士又多就之者先生居于鄉其德不及于閭里在太學太學之士無有與其賢者是果不如舜也某曰子以為若是之不如舜誠是也子且以為今之民皆堯之民乎今之士皆堯之士乎如之何必其人之皆化也孔子曰不如鄉人之善者好之其不善者惡之先生居于太學其鄉人之賢者率其徒狀先生之德上于祭酒司業太學之士聞先生之賢者皆往拜之雖不善之人亦不敢不敬于先生之側先生之德亦可謂化矣其曰不如舜者不如舜之廣也時勢則然也其孝果有以異乎無以異也或者曰夫人孰不為孝子以先生為孝是顯天下之人皆不孝也以先生之孝如舜是舜之後或聖或賢皆不若先生之賢也某曰是又不然者也吾豈敢厚誣天下之人哉人孰不愛其親而先生能盡愛親之道焉盡其孝如先生者有矣吾不得而知也孔子之稱曽子不曰顔子之徒皆不孝也孟子之稱舜不曰堯禹之君皆不孝也舜之後禹湯文武其孝非不若舜也舜之孝顯也禹湯文武而為舜亦舜也天下之孝天下之人皆能盡也能盡其孝者皆舜也豈謂古聖賢不若舜哉當其可也豈謂先生必賢于古聖賢哉當其可也或者曰子以為先生孝而師之是子必不孝也某曰某于天地之間豈敢以不孝自處也雖然吾學焉而未能盡其道者也而先生能盡之則其師也宜或者曰吾子之言馮先生則是也然衆人所不為而吾子必為之人皆以子為狂且怪特邀竒而好名者也姑已之不宜有是名也某應之曰此又吾子之惑滋甚也不識吾子所謂怪者以其異于衆乎以其異于聖人之道乎吾學聖人道者也合于聖人之道者謂之常離于聖人之道者謂之怪古之人未甞無師也雖聖人亦有師吾之師其如舜者獨非聖人之道歟吾何怪之有吾固怪夫世之人未甞求師也卒然問之則必曰吾亦何常師之有否則必曰吾師其成心而已矣夫二者固聖人之道也而世之人以應人者是亦未甞有師者也是亦未甞師其成心者也曰兹不亂聖言以行怪歟其或有焉曰師曰弟子云者亦必求為利而已矣學必為道也如必曰從衆衆人之學為道乎為利乎如曰為道吾從衆可也學必有師也如必曰從衆衆人之學有師乎無師乎如曰有師吾從衆可也人之學不可以不知道欲知道必從師而問焉吾學道也吾求師也而曰邀竒而好名是則聖人之道皆不可為已然則吾安敢避是名哉與其得罪于聖人吾寧得罪于衆人故凡有合于聖人之道者吾必為之凡有不合于聖人之道者吾必去之是非止于道而公也吾不忍枉其道以求合乎衆也凡吾之所學者如是是又不可不辯也如有曰衆如是不可也必從衆吾則敬謝焉如有曰道如是不可也必從道吾則敬受焉吾非求勝者也馮先生贊吾誰與歸惟馮先生舜盡事親先生實能以庻被逐慟哭于庭恐傷親心順命以行假卜以食迺徂于京元豐元年補國子生三歳告歸父猶不聽稽顙自責以顯厥誠遂名曰參以慕于曽迺與其弟復來自西不得于親不慰孝思憂心耿耿望白雲飛實隠不言人莫之知三舉不售有德實遺天之報善亦何杳微嗚呼今世之人鮮有不辱其親者矣吾非斯人而誰與歸書呂博士事元祐二年秋七月辛酉太學徐生不禄博士呂公率其僚往弔而哭之慟周行已躍而起曰於美乎哉師弟子之風興矣自孔子沒大道喪悠悠數千載間學者不知師其師師者不知自處其師維聖若賢百不一遇少也則聞有胡先生能羣諸弟子于太學教之禮風義行翕然嚮古今亡矣三十餘年謂晚生訖不可得見迺復在今日於美乎哉師弟子之風興矣先生之賜甚厚非特太學化之將亦四方化之非特今世化之將亦後世化之先生之賜甚厚也且將歌其風倡之天下布之伶官而上之天子也故書段公度哀詞吾友公度姓段諱萬頃廬陵人負其學來京師求仕元祐二年開封攷其業優薦之禮部明年禮部試復為第六人遂以其名進于天子擢第調太平州蕪湖縣尉將以歸榮其親也未行以六月十八日得寒疾九日遂卒嗚呼余于公度相得最晩而相知最深公度為人貎嚴而氣和言直而辭順樂人之善而厚于義其文無所不能通春秋尤長于楚辭有擬騷一篇其志蓋將以為天下而不得施可哀也夫余故為騷語以哀之公度志也有羙人兮吉水之陽處幽渺兮植蘭芳紛菲菲兮流長昧莫與適兮獨傍徉曰予以俟乎春兮乘光草木旣秀兮鳥翺翔鼓予瑟兮樂子行來歸兮翊上皇采蓀苢兮水中央實旣與兮飲予以瓊漿命不奈何兮以不康乘囘風兮駕忽荒雲靄靄兮雨不降非貺不腆兮實民不良望不來兮悲傷戀戀兮難忘樂生傳鄂之人有樂生者任水鬻于市得百錢即罷休以其僦屋飲食之餘遨嬉于邸戲中旣歸又鼓笛以歌日以為常其隣人有劉氏者饒于財而多營身勞而心常不足聞其貧而樂疑之召問其故曰是吾貧爾也非得已也然貧則易給雖勞而無累吾是以得自樂也富者入其説憐之舉百金使収其利而歸其本生負金而歸遂廢其常業則心營指劃貿貿然朝暮馳逐于市及夜又計之惟恐其不足也憊而寐其聲呼呼如是數日隣之富人不聞其為笛以歌也怪而問之則曰是吾昔也雖貧而無累故自得今也多財而多累故勞于心者常不足以吾之一身百金猶有餘是惡用其多為願復以是歸于主人富者豁然悟曰噫是亦吾之累也遂焚契裂券守其分以終身吾聞之曰有是哉夫天下之不足者生于貪安于分者常自得力不足而求仕智不足而求名噫亦惑矣吾可以自警也歟故記之代李守寺觀祈晴文狂恒雨若顧敏政之不修哀我民斯念艱食之有害方秋務穫時霖弗休諗兹罪譴之敢辭仰覬髙明之垂照倬囘陽光之赫大決隂滯之霪惠彼西成遂兹豐歳代諸廟祈晴文方秋務穫霪雨弗収哀我民斯害于艱食曰暘曰雨惟神之司肅將潔馨仰祈明報原武神廟祈雨文天地之候四氣之序雨潤日暵蓋各有時自春徂夏膏澤未霈先時者苖將就稿後時者種未入土民有憂之惟令民之父母民憂亦憂民喜亦喜神食于此土令之憂亦神之憂也令職其明神職其幽修政布德以召和令之職也驅雷行雨以利物神之職也茍失其時則失其職矣是用潔蠲吉辰恭祈嚴像䖍奉苾芬之薦仰期肸蠁之靈神其念之神其念之原武神廟謝雨文比以下民作苦時雨後愆萬室嗷嗷歸命于神忝攝兹土不得自安當傾丹悃躬叩神祠式蒙神惠洊降膏澤合境告足民心歡欣是用䖍修菲儀以答靈貺惟神弗忘永保有年原武佛寺謝雨文一滴之雨我佛皆知衆妙之生何物非此故最大最明者道惟精惟一者人誠心雖微真理必著比縁亢旱仰叩覺皇果大布于慈雲遂洊降于甘霔四野霑足萬靈歡欣三農務興作之功百物遂發生之性秋成在望民力稍蘇悉歸廣大之神通難報生成之妙利伏願繼今以往與時無窮四海絶水旱之災庻民無盗賊之苦永一人于有慶保萬國之咸寧超化寺龍潭請水文惟神無方徧滿虚空而水性亦徧滿虚空水之所積神龍之所宅也惟龍能大能小或隠或見變化無常能以一滴之水徧滿虚空大地霑潤萬物滋生龍之為神昭昭矣而原武小邑密鄰神龍之宅自春不雨以渉夏中榖苖將槁函種不立民心嗷嗷惟令之憂儻令弗䖍惟神之殛而憫此民庻將弗得食願丐一滴之靈泉以為此方之霖雨因及普天遂周四海惟龍之神感而遂通不疾而速又何難焉超化寺龍潭謝雨文比以農工在務時雨愆期望隂雲之弗興久旱魃之為虐䖍傾丹悃遐仰僊祠恭迎聖地之靈泉遠致敝邑之淨利神龍變化雲雷勃興曽不崇朝而下大雨羣心感悦諸穀遂成是用式薦馨香恭答靈貺仍慿淨梵還致靈潭惟神聽之弗忘永吾民之多福代楚州李守寺觀祈雨萬寳告成屬有陽于旱暵百靈薦祉竟無望于皇慈永惟民食之難實賴神天之祐肅將誠潔躬叩髙明祈布慈雲普施法雨使有生悉霑于利澤均率土咸遂于豐登又代諸廟祈雨刺史惟民之憂民惟食之憂神食于兹土福于兹土民之憂刺史之憂也刺史之憂神之憂也方秋百穀將成雨弗時至秀者不實實者未豐民憂之刺史惟民憂之憂而神亦惟刺史憂之憂也是用肅將明祀徧禱神祠惟神憂其憂而効其靈使民不失望焉神之德也刺史之職也代天慶觀謝雨文下民咨怨雖愚而靈上帝照臨無幽不格惟隆祥所以象德惟務德可以動天頃以秋稼將成時雨弗至念農夫之多戚率官僚而竭誠協臻顒若之孚倏致霈然之澤兆兹豐歳曾不崇朝荷大道罔極之㤙保斯民有秋之望諗茲來報仰冀降歆代崇寧寺謝雨文有情咨怨雖愚而靈大覺慈悲無感不應比以農民之戚仰伸梵竺之祈曽不崇朝霈然下雨兆兹多稼遂大有年民無飢凍之憂國有豐穰之慶仰憑大力難報殊恩代諸廟謝雨文嗟我民斯憂于艱食禱于神止望彼豐年曽不崇朝霈然下雨大田囘潤嘉穀再生仰承顧諟之靈敢後馨香之報閒心寺葢藏文如來出世立教隨機菩薩間生應病示藥羣機不等教設多途諸病殊方藥分衆品故九百八十大部總為方便之門而二十五千餘言盡識真常之旨巍巍寳梵各各叢林獨兹龍就之名山尚闕金文之秘藏十方雲侶罔得披尋四衆檀那若為歸嚮頃結金剛之淨社時宗禪慧之妙門月供千金歳周二律欲乘兹利圖集大緣儻就殊功尚資巨力若男若女已乘般若之舟此生他生更結龍華之㑹閒心寺置椅桌文淳古之風巢居而足莊嚴之事華座非奢彼時此時以宜為貴前聖後聖昜地皆然故彼藁席之儀諒非棟宇之稱惟吾此刹建自大唐僧徒歳増梵宮日廣毎經壇齋筵之盛集而設几敷座之或虧趙州繩牀雖淳淡而自得維摩丈室亦髙廣而必周斯待檀那共安吾衆資道場之宴坐儻獲心閒願天下之普安同沾佛利代郭守修城隍廟文神無不在為物之宗在無不報示必有本城隍之神人民于斯倉廩于斯帑藏于斯甲兵于斯刑獄于斯冒亦大矣報亦厚矣故祀典有載德音所及嗣宇之敝咎將誰執因民之暇卜日之吉易壊以完増陋而嚴以舍神止神之臨矣歳時祀之民之福矣惟吏之職以是來告淨居寺葢造文永嘉名郡圓機故廬開山五百年來受業一千餘衆莊嚴冠于二浙焚修聞于四方爰有名代之宗師實為此邦之福地昨因天數忽遘火災雲侶星奔宮寶燼委星霜之變將及于歳周土木之功罔聞于檀施某等屬以衆緣建請使檄來臨俾為勸導之人辦此興修之事必資巨力共集勝緣此生他生同成于佛果若男若女各發于好心閒心寺建藏院過廊文不為之為應時而造能舍難舍作佛最親廣大聖經藏輪已具莊嚴佛土廊宇未周時節因緣有不獲已檀那布施必所欣聞願發大心共成兹事閒心寺置經藏文金人闡化粤自西乾白馬傳經始于東漢厥後流通彌衆逮兹翻譯滋多并合諸家共為一藏皆是傳心之要悉明成佛之方凡我學徒必勤修證舍諸經教何所依歸闕然貝葉之文虚此寳華之藏敢求信士共集大緣儻發虚心請垂芳字浮沚集巻六
