body:
  text: 浮沚集巻五宋周行巳撰書代上執政書某聞居上位而不援乎下則賢不可得而用居下位而不求援乎上則雖賢而不獲用使仁人君子無意于天下則上下不相為用可也茍有意于天下如之何見賢而弗用與其身自賢而弗求其用哉某誦斯言乆矣未嘗敢聞于人恐不知者以為好大而欲人之尚已也夫好自大而取尚于人君子之所不為某雖不敏顧舍所學而願為之乎然今日持有獻于閣下者以閣下可以聞此而某亦可以無自疑乎此也閣下以道徳相天子拔取天下之才共為太平而天下之吏奮然各自淬厲以僥覬萬一如飢者待哺勞者乞休且不知其幾何人此其志豈無望于閣下哉而某之遲鈍不及事未嘗歛袵執板趨進于左右又無當世顯名在人耳目迺欲卒然以尺一之書自别于衆人而求閣下之知遇某雖自信不疑已使閣下何從而信哉然某未嘗言安知閣下之必不信也某自少時讀書應舉粗為有志于其大者未嘗碌碌隨時俗上下得官十餘年困于奔走簿書之間無所効其長然某亦區區不敢廢職而亦不敢以謹職為能閣下試度某之志與閣下之事孰先孰後哉昔舒元輿嘗上書自薦于唐文宗當時執政不察其心過以浮誕為廢至今有讀其書者為之太息某之事實類此然閣下之賢不可與李宗閔比也鬷明蔑惡堂下一言叔向親援其手曰子如不言吾幾失之矣夫言之不可以已如此且以某之不肖方拙而寡與茍不自言其誰為某言哉故某不避狂昜之誅而以聞于閣下也閣下以為如何哉干冒鈞顔伏地待罪權樂清上韓守書竊惟人子莫不欲孝于其父人臣莫不願忠于其君而其勢有得行有不得行者何哉盖子之于父親也近也故其為孝也莫不得其所欲臣之于君尊也逺也故其為忠也有未必獲其所願是以古之君子在畎畝而不忘居江湖而有懷誠以樂其道不若親見其君之為堯舜著空言不若行事之深切著明此所以伊尹幡然仲尼遑遑馬遷留滯而嘆息也某生五十一年而秩未離乎九品仕二十七載而官僅書乎四考其于賢能可謂至卑矣其去堂陛可謂至逺矣然而願忠之心豈不亦欲與夫朝夕左右侍從之臣同効其尺寸哉獨以其分有所局而其勢不得通雖有吾身親見之志與夫著于行事之實將何所施乎所以踽踽涼涼徒竊嘆于周南而長興懷于魏闕孰吾知者今乃幸以攝事小邑獲預應奉因得効其尺寸之勤乃若髙官大職顧豈敢望哉年衰志闕無所可為獨欲終老海濱卒其區區之願鷦鷯之巢一枝而足偃鼠之腹勺水已盈自度智能不過一邑一曹得與役屬以勤享上官卑而志同職小而忠一左右侍從之臣承命于上趨走服役之臣効力于下上下相濟小大不渝此事所以成而分所以定也某昔者薦名嘗出先徳之門而筮仕之初于今太守為同僚之分以是夤緣因得自列伏覬髙明憐其故家之舊物而采其願忠之誠心不憚一舉手之勤以置于一枝棲息之地他日補報未必在衆人之後也上宰相書某聞人臣之事君也不敢有其身君命之進則進不敢私其身後之君命之退則退不敢强其身先之父召無諾君命召不俟駕行尊者之賜郤之為不恭况君命之進乎侍于長者問日蚤暮則退欠伸撰杖屨則退色斯舉矣翔而後集况君命之退乎然而君子之進也每難其退也每易易于不為而難于有為故也不為義也有為行其義也故曰有不為也而後可以有為某少負羸疾不樂通物泯然居閒竊慕存心養性之説于周孔老佛無所不求而未嘗有意于進取間者父兄命之嘗試以其所知寓于有司之間或者不以為不可遂籍仕版辛未庚子盖三十年矣或遷或罷纔書四考何其進之少而退之多乎豈不曰命之進則進命之退則退不敢私其身而為之進退歟今也行年五十有四憂患病苦齒髪衰矣方寸亂矣少壯不力老將何為而閣下過聽猥蒙收錄進之吾君不以其不肖無堪置之學士大夫之列被命之日不議于人不卜于神舍其閒居安業之私幡然有行不敢以速進為嫌誠為晚遇得歸而不敢有其身故也且士方畎畝不忘致君獨安昔之不為今不可以有為乎閣下二十年間再秉鈞軸天下之士莫不以類而進成就功業而某方以疾故退居田里乃今獲遇雖樸􅈪不足比數然亦豈獨不欲効其尺寸以行其所知哉惟今百度完具四夷賓服上下恬熙内外無患治安無事矣然無事者有事之所慮也古之聖智之人安不忘危治不忘亂雖虞舜成周之盛時未嘗不兢兢業業以相警戒且今任天下之重者獨不在于閣下乎不知閣下以今為樂歟亦以為憂也以為憂則君聖臣賢優游無為上下同樂方享太平何有于憂乎以為樂則慮近之遠審風之自怨不在大禍生所忽未可以為樂也賢者之謀國如醫者之治病五臟六腑不可偏勝偏勝則患生今天下之勢不有偏勝者乎疾之所起必有標本治其疾者必先其本後其標今天下之勢不有急于先者乎閣下以不世之宏才可乆之大徳越自熙豐至于今日逮事三主始終一心豐功偉績昭焕今古所更多矣所知審矣伏自建立以來良法美意皆酌今而可行民便國安皆利便而可乆然而更有異志之變更因之庸吏之玩弛慮其所可憂先其所當務得無復有益廣其未究者乎得無復有當務其偏蔽者乎于是時則又緩急之勢先後之序不知其勢者不可以有為也不知其序者不可以有為也非閣下之智足以知之才足以任之勢足以行之其孰能與于此哉所以方今天下有志之士無有大小無有逺邇無有親疎皆欲轉助閣下以起太平偏勝之勢以圖今日急先之務在閣下益廣賢路以收實才更定法度以救時弊天下有志于斯者舍閣下而無適矣舍是而之他者皆非為國計者也故助閣下者忠臣義士之所願也閣下收之則為朝廷之用舍之則為他門之用矣為他門之用者閣下以為安乎為朝廷之用者閣下以為安乎閣下之用舍朝廷之安危也人君之職在任一相一相之職在任羣賢自古未有得才而不治者亦未有不才而治者也天下之治亂在于法度之善否法度之善否在于人才之得失人能為之人能壞之人能修之未有出于人而人不可為者獨時有險易才有智愚智者可以濟其險愚者可以行其易雖曰成功則天而不可曰天也人不可為也所以知其可為者天下之心皆欲安而已矣所以不可不為天下安斯朝廷安矣故所以用人者在于善法度也所以善法度者在于安天下也天下安則朝廷安朝廷安則私門亦安矣計私門而不計國家自古未有得以安者也故智者處其安愚者處其危欲濟未危之勢而保至安之計者舍閣下未知其孰可與議者顧雖晚至下客獨效古人區區之義布其腹心以幸萬一若夫條布緩急之勢與其先後之序則以俟命未可以立言判也干冒鈞聽下情無任恐懼之至上祭酒書行已敢言之行已七歳就傅授句讀誦五經書十五歳學屬文十七歳補太學諸生是時一心學科舉文編綴事類剽竊語言凡所見則問而學焉趨而從之十八九相與也又二年讀書盖見古人文章浩浩如波濤纚纚如春華于是樂而慕之又學為古文上希屈宋下法韓柳見自古文人多不拘爾謂誠若是也恃文為非誚慿文以戲謔自謂吾徒為神仙中人而鄙昔之相從者謂跼促若轅下駒然求其問而學焉者十或得二三爾又二年讀書益見道理于是始知聖人作書遺後世在學而行之非以為文也乃知文人才士不足尚昔吾先聖言雖有周公之才之美使驕且吝其餘不足觀也已又况中人以下以片言隻句之小才以自咤于敦實之士乎意謂學期至于孔子而已且言曰士志于道據于徳依于仁游于藝所以教學也于是早晚思古人之修徳立行誦其詩讀其書日與古人居讀其書誦其詩日與古人謀言亦思古人也行亦思古人也于是求問而學焉者益罕矣凡昔之交游者今則皆謝之而不敢學焉凡昔之所鄙者今則皆敬之而不敢慢焉兢兢衆人之中惟恐一叛乎道而入于流俗之習日學之夜思之未始敢舍也有人誘之曰子迂也何不為時之趨行已則不敢從也有人鄙之曰子矯也何不任真之樂行已則不敢已也嘗以是二者校已之所祈嚮者而思之則亦嘗語之曰中人之性就下則昜趨上則難未有不以修為而能為君子善人者也若縱性之所欲而合之以衆人之所為則必愈下爾不學則已學焉而不知道君子不為也昔韓文公之言曰行成于思毁于隨有旨哉又曰善雖不吾與吾將强而附不善雖不吾拒吾將强而去皆父兄之所教于行已而某之所願學者也故得以是説拒之又行之今才期月爾非而毁之日益甚行已亦弗之易也更求已之所未至者而為之凡所近于厚者無所不為也凡所近于薄者無所不去也去年且思陽城之訓念何蕃之行遂以覲親告歸于涇今也且以是來學不識所從者果正矣其猶有説乎孔子曰敏于事而慎于言就有道而正焉某雖不敏竊願學焉伏惟先生誨人不倦願賜一言以正之幸甚幸甚與佛月大師書昨日言詩頗為開益苦手瘡殊無情緒不能款款議論歸來甚闕然意謂尚未深得師之妙耳昔齊已號詩僧也不過風花雪月巧句而于格又頗俗今之參寥亦以詩名雖豪逸可愛人不及道吾師數篇已能過之清思妙句飄然如孤鵠翔雲又能作古體淡淡造靜理學之不已古人不難到也知禪衆中好静甚不欲時時往聒噪輙得小詩奉寄能以問答之餘見和否伏暑願彌盡珍重理渴仰渴仰啟謝鄆帥王待制辟司錄啓當其失職衆所棄捐乃于窮時獨被收采義與尋常而加重感淪方寸以彌深伏念某受數多竒居閒少仕行不俟駕盖人臣莫敢有其身出以為時故君子亦欲行其義志雖大而無當道固迂而難逄匪九泉之是謀亦三黜之奚怨獨志業之未就邈歳月之忽徂亦已焉哉不作周公之夢聊且爾耳將求范蠡之舟屬東南之㓂攘蹇去留之道阻迍邅多故流落殊方百病咸生千金散盡茍將免死孰不為貧方滯念之紛如朅嘉招之俯及捧檄而喜載懷三釡之悲承命即行敢負百金之諾此盖某人懷忠信而近厚敦故舊而弗遺欲四海之舉安况一夫之失所激頹風于難進拔寒流以事君雖匪其人盖亦有意老而彌劭勉吾信之未能窮且益堅期民安而為報代賀吳侍郎啓渙恩中扆正位東臺凡屬甄鎔率同忭蹈恭以某人三朝雋老一徳舊臣道盛格天之功仁懋佐王之業一人簡在百辟具瞻果自殊庭再登黄闥朝廷尊重慰人望于巖巖輿頌載喧識公歸于几几竚疇丕績薦正冢司竝九叙以歌庸浹萬方而胥悦某邈分郡寄阻簉賓墀歡逺服之孤心慶熙朝之盛典蟠木願器早荷于元工坯土在鈞日陶于洪造代徐守謝金帶紫章服啓祗奉貢儀恪修臣職誤䝉中旨洊錫異恩帶飾黄金媿靡功于將閫服加紫綬榮曳綵于親庭曽無毫髪之勞曷稱便蕃之賜顧惟疎賤必有夤緣此盖某人載世勲門鍾天間氣文章班馬優廷策于巍科道徳老莊静臣心于止水出納帝命允惟夙夜之勞陟降王庭式是靖恭之節榮宣恩旨密贊俞音故得小臣叨蒙盛典敢不精審有孚之吉勉持不息之誠惟孝及忠終始敢期于一節乃恩與徳頂踵奚報于萬分代人賀樞密啓恩渙宸庭位隆天府聳聞休命逷抃輿心恭以某人問學淵源性資端亮出甚盛之世佐有為之君天下僉曰才難主上必其柄用内參宸略坐制本兵决斷機務之先從容廟堂之上每深簡在方切具瞻果進樞衡之茂庸總司喉舌之重柄可大之業非位不行太平之基得賢所致故將紀綱四海弼諧萬幾法度清而陰陽和造化調而天地順進司元宰益重本朝某邈守逺藩側聆光命莫次鳧趨之列徒深燕賀之誠學官與交代啓舊尹之政告新尹矧在儒官先知之民覺後知惟尊道藝非宜晚學輙代髙賢伏惟某人有徳而文因人以教拳拳遵囘之好踽踽慕軻之傳樂得英才共希生而知者如工大木惟恐斵而小之造三年而有成修四教以誰繼豈茲汰礫之在後能與精金而爭輝翔集泮林願終同于聲氣泳思學海當不異于源流瞻徳誠深頌言靡既賀張節使啓伏審揚命王庭賜旌侯服伏惟歡慶恭以某人胚胎間氣心膂良臣才髙人傑之雄戚重國甥之懿乆騰英譽密簡淵衷果疇勲閥之隆爰付旌旄之寄宸慈欽叙式慰在天之靈庶言允諧克協象賢之慶金章紫綬爭輝綵服之榮畫㦸油幢彌重仙官之貴仲尼孝友何必有政于藩宣卻縠詩書正可坐籌于帷幄為國屏翰期永保于乂康若時謀猷將無忘于入告竚觀逺業益進近司凡在有知孰不交慶某夙蒙恩顧喜劇私誠疾方困于河魚賀輙愆于厦燕與張才叔啓昨離師帳乆侍親闈實縁省定之勤是缺興居之問有懷文席無喻寸襟屬茲承乏于成均竊獲經途于治部操舟及境豫深望履之懷執箒候門行遂摳衣之請是為慰抃奚究敷宣代郡守除漕謝運使啓分符屬部實荷安全聨職計司復叨庇賴辱奬提之有自惟欣感之何云恭惟某人學有淵源行多枝葉搢紳先生之所欣慕國家天下之所曰賢暫領外臺豈乆淹于逺服即聞中詔行進拜于近宸某孤陋無聞數竒不偶功名晚矣行年半百之餘世味淡然宴坐一身之寄顧豈長于治賦尚有切于依仁晤展未聞願言曷既賀轉運使復任啓光膺詔旨再領使權凡在庇臨罔不抃躍恭惟某人才周治體學造聖㣲繇清閥以開祥奮榮途而厎績知深宸扆名竦朝紳迺眷西顧之列城實預中都之計偫曩付轉輸之重嘗資課入之優農事弗違軍儲有羡風聞謬誤輙致煩言天監昭明遽還舊物俾宣寛大之詔倚分宵旰之憂一方夙懼于神明比屋復覩于富庶足兵足食豈止致俗于阜康有猷有為行即進司于宥密某攝居屬部預遵教條瞻厦屋以欣如奉簡書而惕若浮沚集巻五
