body:
  text: 浮沚集卷二宋周行巳撰經解仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣道本無名所以名之曰道者謂其萬物莫不由之也萬物皆有太極太極者道之大本萬物皆有兩儀兩儀者道之大用無一則不立無兩則不成太極即兩以成體兩儀即一以成用故在太極不謂之先為兩儀不謂之後然則謂之一陰一陽者不離乎一也謂之道者不離乎兩也所以太虛之中絪縕相蕩升降浮沈動靜屈伸不離乎二端散殊而可象者為物物者陰陽之迹也故曰乾陽物也坤陰物也清通而不可象者為神神者陰陽之妙也故曰陰陽不測謂之神不測則不可謂之二成物則不可謂之一二即一而不離神體物而不遺見此者謂之知道體此者謂之得道然是道也夫何遠之有哉繼于善者進乎此矣成于性者復乎此矣孟子曰可欲之謂善又曰性無有不善夫善者對不善之稱也可欲者對可惡之稱也無不善則亦無善之可稱無可惡則亦無欲之可稱是知失性者天下之不善也不善者天下之可惡也得性者天下之善也善者天下之可欲也然則人之有善皆得乎性者也人之有不善皆失乎性者也茍能食則見善于羮坐則見善于牆立則見善參于前在輿則見善倚于衡顛沛必于善造次必于善相繼無間不離于道矣善既純一則無不善不善既無善亦不立成于性者也成于性則無不全也無不盡也然而命于陰陽者氣質之禀不同則昏明之性亦異成性于仁者以斯道謂之仁斯道非不仁也然仁不可謂之道成性于知者以斯道謂之知斯道非不知也然知不可謂之道皆其成性之不同所見之不周猶伯夷得聖人之清柳下惠得聖人之和非不善也然不可謂之大成夫一物之中皆具一道一道之內皆具陰陽不能盡其大心以充其性遂以小見為大道止于斯良由生禀之或偏而不知學或學之不至而小成此皆賢者之過所以君子之道鮮也至于天下之民目視耳聽手舉足運無非道者朝作暮息渴飲飢食無非道者然而察其聲音鍧鍧目視眴眴有生而已終身由是曾不知灑掃應對之妙道而耕稼陶漁之可以聖也是豈道之遠人哉孟子曰行之而不著焉習矣而不察焉終身由之而不知其道者衆也此皆不肖者之不及所以君子之道鮮也夫所謂君子之道中而已矣或偏于仁或偏于知過乎中者也日用而不知不及乎中者也太極即中也中即性也太極立而陰陽具乎其中矣性成而隂陽行乎其中矣是故昜之為書陰陽之道也六十四卦三百八十四爻無非是者然而得所謂君子之道者寡而過與不及者多此孔子繫辭所以明一陰一陽之道而深嘆夫君子之道鮮也雖然萬物負陰而抱陽誰獨具無道乎反身而誠斯得之矣此所以天下之人不可自棄而學昜者不可以不盡心也曲禮曰毋不敬儼若思安定辭安民哉曲禮者禮之至曲者也大則簡曲則詳然曲能有誠至于變化豈有二致哉故其為禮者曰毋不敬所以戒夫人之不可以不敬也蓋敬者君子修身之道也所以間邪而存其誠者也敬斯定定斯正正者德之基也慢斯怠怠斯邪邪者德之賊也古之人相在爾室不愧屋漏出門如見大賔使民如承大祭何所不用其敬哉儼若思者非思也凡思者其心必有所止心有所止者其耳目視聽必有所忘蓋其心定者其容寂此儼者所以若思而非思也古之人知止而慮善恭默以思道此有思者也南郭子綦之隱几嗒焉似喪其耦顔淵之坐忘黜聰明墮肢體此無思者也無思者天也有思者自人而之天也古之為道如此安定辭者昜所謂昜其心而後語也蓋一辭之不中皆心之過孟子所以謂不得于言勿求于心不可而頤之養正君子所以慎言語是以存于心者既見乎辭考其辭者亦可以知其人也此三者禮之大節君子學道之要也自天子達于庶人自修身至于為天下莫不一于是故敬則無敢慢無敢慢則民莫不愛矣儼則人望而畏之人望而畏之則民莫不敬矣安定辭則其言善其言善則民莫不應矣敬也儼也安定也舉乎其上者如此所以安民之道也愛也敬也應也錯乎其下者如此民所以安之之效也匹夫而有此必有安民之術天子而有此必有安民之事故曰安民哉傲不可長欲不可從志不可滿樂不可極君子所以知天者知其性也所以事天者事其心也性之不明心之不存則在我者與天不相似故有長傲以悖天德從欲以喪天性所見者小則其志昜滿天道虧矣所慕者外則其樂昜極天理滅矣人之所以為人者天也失其天豈可謂天之人乎此其喪精失靈皆可哀之民也原夫凡人之所以有傲者何也以其有我而已矣以我為我則彼為之對矣彼我既分勝心生焉强此而劣彼此所謂傲也彼既自彼我既自我傲且不足以輕彼適所以害我是心也且不可有况可長乎若我既無我則彼亦無彼何傲之有彼有大傲者焉傲睨乎萬物之上者是也是傲也非世俗之鄙心也道獨尊而無對故也凡人之所以有欲者何也以其有物而已矣以物為物則我為之役矣物我既交愛心生焉忘已而徇物此所謂欲也物既自物我既自我欲且不足以益我適所以喪我是心也且不可有况可從乎若物既無物則我亦無我何欲之有彼有大欲者焉從心所欲不踰矩者是也是欲也非世俗之鄙心也道無心而不留故也志固不可滿而凡人之志所以可滿者所志者利也其志在利者利得其志必滿志滿者必驕由志道者觀之不亦隘乎故大志者古今不可以為限固不可滿也樂固不可極而凡人之樂所以有極者所樂者僞也故所樂在物物得其樂必極樂極者必淫由樂道者觀之不亦鄙乎故大樂者天地不能變萬物不能昜固不可極也然則斯四者為之小者必可謂之小人矣為之大者必可謂之大人矣君子之學去其小者存其大者如斯而已矣賢者狎而敬之畏而愛之愛而知其惡憎而知其善積而能散安安而能遷臨財毋茍得臨難毋茍免狠無求勝分無求多疑事無質直而勿有君子之于學也能親賢然後能明善能明善然後能至公能至公然後能無纍能無纍然後能自立能自立然後能與人能與人然後能善世此學者本末之序也天下之人莫不善也賢者先得乎其善者也故其溫良可親也其威嚴可畏也親之而不知敬則其流必昜畏之而不知愛則其漸必疏昜則不知善之可尊疏則不知善之可親狎而敬之而不失其尊畏而愛之而不失其親君子之親賢有如此者天下之蔽莫大乎私天下之明莫大乎公君子之于人也無私好其所好者必善者也無私惡其所惡者必不善者也故所愛者善也不以所愛蔽于所不愛乃天下之公好也所憎者不善也不以所憎蔽于所不憎乃天下之公惡也惟能公于好惡故能不以一巳之愛憎而昜天下之善惡君子之至公有如此者凡人之所以厚積者必以為私所分也惟公者能以天下為度則不纍乎物存人者猶在已也奚積而不能散乎凡人之所以居安者必以為我所安也惟公者能以天下為宅則不纍其居在彼者猶在此也奚安而不能遷乎惟其能散也故散而不失其所積惟其能遷也故遷而不失其所安君子之無纍有如此者若夫纍于物者則臨財必求茍得纍于身者則臨難必求茍免惟君子忘物所以立我故不纍于物忘我所以立道故不纍乎身內外無纍故可以得而得無心于得非所謂茍得也可以免而免無心于免非所謂茍免也君子之所以自立有如此者今天下之所以好勝者為其不能忘我也天下之所以多得者為其不能遺物也茍能忘我而常處其弱則人之狠者不求勝而天下莫能勝矣茍能遺物而常處其不足則人之分者不求多而天下莫能損矣茍持是于天下雖之蠻貊而必行入麋鹿而不亂君子之所以與人有如此者君子之知衆人之所以疑也衆人之曲君子之所以直也然而君子有同天下之志而無善一巳之心故致其大知以釋其疑使天下之疑者不疑先質其疑則天下疑矣推其大直以直其未直使天下之不直者直先有其直則天下不直矣故不質其疑所以欲天下之皆致其知也不有其直所以欲天下之皆得其直也君子之善世有如此者凡此數者君子之所務而衆人之所深戒者也故或曰能或曰毋或曰勿語其志則一也若夫坐如尸立如齊禮從宜使從俗君子之所以必莊必敬者非所以飾外貌所以養其中也蓋其心肅者其貌必莊其意誠者其體必敬為尸者所以象神不莊不敬則神弗臨之矣必莊必敬然後可以為尸故君子之坐如之為齊者所以接神不莊不敬則神弗接之矣必莊必敬然後可以為齊故君子之立如之方是時也其心寂然而無一物其孚顒若而無他慮是心也聖人之心也顔子三月不違仁不違此心也其餘日月至焉至此心也聖人從心所欲不踰矩不踰此心也聖人常顔子久其餘暫百姓日用而不知也學者舍是亦何所求哉古之人何獨坐立然後如此此特舉其大端而已也立則見其參于前在輿則見其倚于衡出門如見大賔使民如承大祭非禮勿視非禮勿聽非禮勿言非禮勿動無須臾之離終食之違造次必于是顛沛必于是所以存心養性大過人遠矣此學者入德之要不可以不思也禮從宜使從俗馬鄭之說備矣夫禮者所以定親疏决嫌疑别同異明是非也禮者中而已矣萬物之至情天下之達德也君子不敢過小人不敢不及一定而不可昜者也猶規矩設而不可欺以方圓繩墨陳而不可欺以曲直故天下之親疏者于此可以定天下之嫌疑者于此可以决天下之同異者于此可以别天下之是非者于此可以明茍舍是焉而無以辨則總總林林亦何以相與立于天地之間哉此所以有禮則治無禮則亂也禮不妄說人不辭費禮者正而已矣妄說人非正也辭費非正也何也今人之所以妄說人者不有求于人必欲逭已責也人之所以辭費者不有矜已能必欲辭已過也君子無求而安于命何為而妄說于人哉君子不矜而過必改何為而費于辭哉說以其道者正說也君子有之辭取其達者正辭也君子有之說不以道亦人之所不說而辭之多且游者亦聖人以為躁而誣善然則人亦何取于妄說人與辭費哉此禮所以不為也禮不踰節不侵侮不好狎禮者分而已矣居下而犯上則踰上之節不知下之分也居上而逼下則踰下之節不知上之分也侵侮者失人不知人之分也好狎者失已不知已之分也君子明禮而知分故居上不驕為下不亂與人不爭處已必敬此所以作事可法容止可觀而為萬夫之望者也修身踐言謂之善行行修言道禮之質也孳孳為善者舜之徒也孳孳為利者跖之徒也天下莫不為善豈人人為舜也歟哉非也方其為善其心則舜之心也天下莫不為利豈人人為跖也歟哉非也方其為利其心則跖之心也故人不可以不為善也雖小善而必為然後能為大善舜之所以為舜者以其樂取諸人以為善聞一善言見一善行從之莫能禦也然則如之何斯可以為善矣曰修身也踐言也修身者必敬踐言者必忠忠與敬者善之大端入德之要也故曰修身踐言謂之善行行篤敬則行修矣言忠信則言道矣故曰義以為質禮以行之又曰忠信之人可以學禮此行修言道所以為禮之質也茍無其質雖習于曲禮威儀之多君子不謂之知禮晚周之衰天下士大夫既其文而不既其實莊周寓言矯弊遂以為忠信之薄而道之華此豈吾聖人所謂禮云禮云者乎禮聞取于人不聞取人禮聞來學不聞往教君子有財以給天下之求有道以應天下之問其心必欲無一夫之不獲其所而天下之人皆至于道聖人在上則行其道聖人在下則懷其志故堯舜所以猶病于博施濟衆而孔子乃于其老者安之朋友信之少者懷之此豈取人而往教所得周哉蓋取人則失已往教則枉道聖人中道而立使天下之人皆得取于我而來學以求正焉則已立而給不匱道大而應無方然後天下之人皆得預被其澤而有足者咸可以至于斯此禮所以在彼而不在此也文之以禮樂孔子曰立于禮成于樂孟子曰禮者節文斯二者是也樂者樂斯二者是也君子之為人不惟率性守質而已固有禮樂以文之也今人有大其居者知丹雘之為麗則必塗其垣牆然後謂之富室有愛其身者知衣服之為美則必飾以組繡然後謂之備服此庸人匹夫之所及非有過人之智而後能也今之修性學道反不能焉豈禮樂之不及歟蓋以謂不足為而不為耳天下之咎莫大于不足為不能為者次之不足為者曰禮與樂者人之文也吾將游乎天而皆不足為也孟子所謂非徒無益而又害之者是也不能為者孳孳焉拳拳焉守一善占一藝以終其身則其無咎也亦有間矣彼之自絶于禮樂者其學蓋出于老氏齊其上下等其君臣漠然欲置天下于無而人之所以相生養之道與其所以歡欣交通之情皆不若相忘之為愈此其寡恩于禽獸也甚矣嗚呼胡為學聖人者反樂此之異哉若臧武仲之知公綽之不欲卞莊之勇冉求之藝所守一善占一藝以終其身者雖然禮樂非有異于人之性也學者止于道焉而已性者道之質也禮樂者道之具也上焉者生而能之中焉者學而能之下焉者勉而能之及其至也皆謂之成人可也然則聖人豈異于人哉乃所願則學孔子也嗚呼孔子之生所謂不幸之幸者也不幸而生于世衰道微終以窮死復幸而得賢弟子有顔回者師其道于當時有孟軻者師其道于後世而聖人之道庶幾乎有傳雖然吾嘗謂為顔回者昜而為孟軻者難揚雄所謂在則人亡則書其說蓋亦未盡也譬夫見龍而象龍與不見龍而畫之者形容具存而耳目可及故象者昜為力若夫目之所未嘗見耳之所未嘗聞而區區求諸有無之間而擬其形容故畫者難為功也雖然聖人之道言所不能傳而非言亦無以傳是故善學者因其言而求其心躍然有得于中然後合之于聖人之道果無以異也而後為之是亦聖人也故見而師之于當時者昜聞而師之于後世者難知其難而能難者後世有孟軻一人而已孟軻真知孔子者也故其言伯夷伊尹柳下惠以謂皆得聖人之一偏而獨推尊孔子為集大成又從而為之辭曰乃所願則學孔子也故言伯夷之清柳下惠之和伊尹之任則譬之以力孔子之集大成則譬之以巧蓋巧者能中而力者能至也夫射者期至于的也有力者皆能至其在東西上下未可知也惟巧者能中于的故孔子之道無可無不可者也伊尹伯夷柳下惠之道或清或任或和皆東西上下者也孔子之道聖人之中也行之萬世而無弊伯夷伊尹柳下惠聖人之過也天下之賢者行之而無弊不肖者行之而有弊天下之智者行之而無弊愚者行之而有弊其中者常道也其過者權道也伯夷伊尹柳下惠之憂後世也深孔子之慮後世也大其立教異也其心則皆聖人之心也故學者必明夫聖人之心此不可不知也浮沚集卷二
